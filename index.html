<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教員タスク管理 (Cloud Sync)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body{ font-family: sans-serif; margin:0; background:#f5f7fa; }
    header{ background:#2563eb; color:white; text-align:center; padding:15px; font-size:24px; font-weight:bold; position: relative; }
    .back-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 16px; font-weight: normal; }
    .container{ padding:15px; }
    .card{ background:white; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    input, select, textarea{ width:100%; padding:10px; margin-top:5px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button{ width:100%; padding:12px; border:none; border-radius:10px; background:#2563eb; color:white; font-size:16px; cursor: pointer; }
    button:hover{ background:#1d4ed8; }
    .task{ background:white; margin-bottom:10px; border-radius:10px; padding:10px; display:flex; justify-content:space-between; align-items:center; border-left: 8px solid #2563eb; }
    .task-left{ flex:1; }
    .small{ font-size:12px; color:#666; }
    .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: white; }
    .done{ text-decoration:line-through; opacity:0.5; }
    .delete-btn{ background:red; color:white; border:none; padding:5px 10px; border-radius:6px; width:auto; }
    .loading-text { text-align: center; color: #666; font-size: 14px; }
</style>
</head>
<body>

<header>
    <a href="top.html" class="back-btn">＜ 戻る</a>
    📚 教員タスク管理
</header>

<div class="container">
    <div class="card">
        <h3>タスク追加</h3>
        <input id="title" placeholder="タスク名">
        <select id="category"></select>
        <input type="date" id="deadline">
        <select id="priority">
            <option>高</option>
            <option>中</option>
            <option>低</option>
        </select>
        <textarea id="memo" rows="3" placeholder="メモ"></textarea>
        <button id="addBtn" onclick="addTask()">追加</button>
    </div>

    <div style="text-align: right; margin-bottom: 10px;">
        <a href="category.html" style="color:#2563eb; font-size:14px; text-decoration:none;">⚙ カテゴリと色を編集</a>
    </div>

    <div class="card">
        <h3>全端末共通タスクリスト</h3>
        <div id="taskList"><p class="loading-text">データを読み込み中...</p></div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://klewsfgafeixuvghkkvi.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tasks = [];

// カテゴリデータの初期化と変換処理
function getCategoryData() {
    let data = JSON.parse(localStorage.getItem("teacherCategories"));
    if (!data) {
        data = [
            {name: "学級経営", color: "#e11d48"}, {name: "授業準備", color: "#2563eb"},
            {name: "校務分掌", color: "#059669"}, {name: "生徒指導", color: "#d97706"},
            {name: "保護者対応", color: "#7c3aed"}, {name: "研修", color: "#db2777"},
            {name: "日本人学校", color: "#4b5563"}, {name: "その他", color: "#94a3b8"}
        ];
        localStorage.setItem("teacherCategories", JSON.stringify(data));
    }
    // 古い形式(文字列配列)の場合はオブジェクト形式に変換
    if (data.length > 0 && typeof data[0] === 'string') {
        data = data.map(name => ({ name: name, color: "#2563eb" }));
        localStorage.setItem("teacherCategories", JSON.stringify(data));
    }
    return data;
}

function loadCategories(){
    const select = document.getElementById("category");
    const categories = getCategoryData();
    select.innerHTML = "";
    categories.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        opt.textContent = c.name;
        select.appendChild(opt);
    });
}

async function fetchTasks() {
    const { data, error } = await _supabase.from('tasks').select('*');
    if (error) {
        document.getElementById("taskList").innerHTML = "エラーが発生しました";
        return;
    }
    tasks = data;
    renderTasks();
}

async function addTask(){
    const titleInput = document.getElementById("title");
    const title = titleInput.value;
    const btn = document.getElementById("addBtn");
    if(title === ""){ alert("タスク名を入力してください"); return; }
    btn.disabled = true;
    btn.innerText = "送信中...";
    const newTask = {
        title: title,
        category: document.getElementById("category").value,
        deadline: document.getElementById("deadline").value || null,
        priority: document.getElementById("priority").value,
        memo: document.getElementById("memo").value,
        done: false
    };
    const { error } = await _supabase.from('tasks').insert([newTask]);
    if (error) { alert("追加に失敗しました"); } else {
        titleInput.value = ""; document.getElementById("memo").value = "";
        await fetchTasks(); 
    }
    btn.disabled = false; btn.innerText = "追加";
}

async function toggleTask(id, currentStatus){
    await _supabase.from('tasks').update({ done: !currentStatus }).eq('id', id);
    await fetchTasks();
}

async function deleteTask(id){
    if(confirm("削除しますか？")){
        await _supabase.from('tasks').delete().eq('id', id);
        await fetchTasks();
    }
}

function renderTasks(){
    const list = document.getElementById("taskList");
    const categoryData = getCategoryData();
    list.innerHTML = "";
    if (!tasks || tasks.length === 0) {
        list.innerHTML = "<p class='loading-text'>タスクはありません</p>";
        return;
    }
    const sortedTasks = [...tasks].sort((a, b) => {
        if (!a.deadline) return 1; if (!b.deadline) return -1;
        return new Date(a.deadline) - new Date(b.deadline);
    });
    sortedTasks.forEach((task)=>{
        const catInfo = categoryData.find(c => c.name === task.category) || {color: "#ccc"};
        const div = document.createElement("div");
        div.className = "task";
        div.style.borderLeftColor = catInfo.color;
        div.innerHTML = `
        <div class="task-left ${task.done ? 'done':''}">
            <span class="cat-badge" style="background:${catInfo.color}">${task.category}</span><br>
            <strong style="font-size:17px;">${task.title}</strong><br>
            <span class="small">締切:${task.deadline || '未設定'} ｜ 優先度:${task.priority}</span><br>
            <span class="small">${task.memo || ''}</span>
        </div>
        <div>
            <input type="checkbox" ${task.done ? 'checked':''} onchange="toggleTask('${task.id}', ${task.done})">
            <button class="delete-btn" onclick="deleteTask('${task.id}')">削除</button>
        </div>
        `;
        list.appendChild(div);
    });
}

loadCategories();
fetchTasks();
</script>
</body>
</html>
