<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教員タスク管理 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;margin:0;background:#f3f6fb}
header{background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;padding:18px;text-align:center;font-size:24px;font-weight:bold;position:relative}
.back-btn{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#fff;text-decoration:none}
.container{padding:15px;max-width:900px;margin:auto}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 4px 12px rgba(0,0,0,.08)}
input,select,textarea{width:100%;padding:10px;margin:6px 0 10px;border:1px solid #d1d5db;border-radius:10px;box-sizing:border-box}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#2563eb;color:#fff;font-size:16px}
.stats{display:flex;gap:10px;margin-bottom:10px}
.stat{flex:1;background:white;padding:10px;border-radius:12px;text-align:center;font-weight:bold}
.task{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.done{text-decoration:line-through;opacity:.5}
.badge{padding:3px 8px;border-radius:20px;color:#fff;font-size:11px;font-weight:bold}
.priority-high{background:#dc2626}
.priority-mid{background:#f59e0b}
.priority-low{background:#16a34a}
.small{font-size:12px;color:#666}
.delete-btn{background:#dc2626;width:auto;padding:6px 10px}
.today{animation:blink 1s infinite}
.overdue{background:#fee2e2}
.warning{background:#fff7ed}
@keyframes blink{50%{opacity:.4}}
</style>
</head>
<body>
<header>
<a href="top.html" class="back-btn">＜戻る</a>
📚 教員タスク管理 Pro
</header>

<div class="container">

<div class="stats">
<div class="stat">総数<br><span id="taskCount">0</span></div>
<div class="stat">未完了<br><span id="openCount">0</span></div>
</div>

<div class="card">
<h3>タスク追加</h3>
<input id="title" placeholder="タスク名">
<select id="category"></select>
<input type="date" id="deadline">
<select id="priority">
<option>高</option>
<option>中</option>
<option>低</option>
</select>
<textarea id="memo" rows="3"></textarea>
<button id="addBtn" onclick="addTask()">追加</button>
</div>

<div class="card">
<h3>タスク一覧</h3>
<div id="taskList"></div>
</div>
</div>

<script>
const SUPABASE_URL="https://klewsfgafeixuvghkkvi.supabase.co";
const SUPABASE_KEY="sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0";
const _supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const categoryColors={
"学級経営":"#2563eb",
"授業準備":"#16a34a",
"校務分掌":"#f59e0b",
"生徒指導":"#dc2626",
"保護者対応":"#9333ea",
"研修":"#0891b2",
"日本人学校":"#ec4899",
"その他":"#6b7280"
};

const categoryIcons={
"学級経営":"🏫",
"授業準備":"📖",
"校務分掌":"📋",
"生徒指導":"👦",
"保護者対応":"👨‍👩‍👧",
"研修":"🎓",
"日本人学校":"🌏",
"その他":"📌"
};

let tasks=[];

if(!localStorage.getItem("teacherCategories")){
localStorage.setItem("teacherCategories",JSON.stringify(Object.keys(categoryColors)));
}

function loadCategories(){
const select=document.getElementById("category");
select.innerHTML="";
(JSON.parse(localStorage.getItem("teacherCategories"))||[]).forEach(c=>{
let o=document.createElement("option");
o.textContent=c;
select.appendChild(o);
});
}
loadCategories();

async function fetchTasks(){
const {data}=await _supabase.from('tasks').select('*');
tasks=data||[];
renderTasks();
}

async function addTask(){
const title=document.getElementById("title").value;
if(!title){alert("タスク名を入力してください");return;}
await _supabase.from('tasks').insert([{
title,
category:document.getElementById("category").value,
deadline:document.getElementById("deadline").value||null,
priority:document.getElementById("priority").value,
memo:document.getElementById("memo").value,
done:false
}]);
document.getElementById("title").value="";
document.getElementById("memo").value="";
fetchTasks();
}

async function toggleTask(id,current){
await _supabase.from('tasks').update({done:!current}).eq('id',id);
fetchTasks();
}

async function deleteTask(id){
if(confirm("削除しますか？")){
await _supabase.from('tasks').delete().eq('id',id);
fetchTasks();
}
}

function renderTasks(){
const list=document.getElementById("taskList");
list.innerHTML="";

document.getElementById("taskCount").textContent=tasks.length;
document.getElementById("openCount").textContent=tasks.filter(t=>!t.done).length;

tasks.sort((a,b)=>new Date(a.deadline||"2999-12-31")-new Date(b.deadline||"2999-12-31"));

tasks.forEach(task=>{
const color=categoryColors[task.category]||"#2563eb";
const icon=categoryIcons[task.category]||"📌";

let priorityClass="priority-low";
if(task.priority==="高") priorityClass="priority-high";
if(task.priority==="中") priorityClass="priority-mid";

let extraClass="";
let deadlineText=task.deadline||"未設定";

if(task.deadline){
const today=new Date();
today.setHours(0,0,0,0);
const due=new Date(task.deadline);
const diff=Math.ceil((due-today)/(1000*60*60*24));

if(diff<0) extraClass="overdue";
else if(diff===0) extraClass="today";
else if(diff<=3) extraClass="warning";
}

const div=document.createElement("div");
div.className="task "+extraClass;
div.style.borderLeft="6px solid "+color;

div.innerHTML=`
<div class="${task.done?'done':''}">
<strong>${icon} ${task.title}</strong><br>
<span class="badge" style="background:${color}">${task.category}</span>
<span class="badge ${priorityClass}">${task.priority}</span><br>
<span class="small">締切:${deadlineText}</span><br>
<span class="small">${task.memo||""}</span>
</div>
<div>
<input type="checkbox" ${task.done?'checked':''}
onchange="toggleTask('${task.id}',${task.done})"><br>
<button class="delete-btn" onclick="deleteTask('${task.id}')">削除</button>
</div>`;
list.appendChild(div);
});
}
fetchTasks();
</script>
</body>
</html>
