<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教員タスク管理 (Cloud Sync)</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    body{ font-family: sans-serif; margin:0; background:#f5f7fa; }
    header{ background:#2563eb; color:white; text-align:center; padding:15px; font-size:24px; font-weight:bold; position: relative; }
    .back-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 16px; font-weight: normal; }
    .container{ padding:15px; }
    .card{ background:white; border-radius:12px; padding:15px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    input, select, textarea{ width:100%; padding:10px; margin-top:5px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; }
    button{ width:100%; padding:12px; border:none; border-radius:10px; background:#2563eb; color:white; font-size:16px; cursor: pointer; }
    button:hover{ background:#1d4ed8; }
    .task{ background:white; margin-bottom:10px; border-radius:10px; padding:10px; display:flex; justify-content:space-between; align-items:center; border-left: 8px solid #2563eb; }
    .task-left{ flex:1; }
    .small{ font-size:12px; color:#666; }
    .cat-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: white; }
    .done{ text-decoration:line-through; opacity:0.5; }
    .delete-btn{ background:red; color:white; border:none; padding:5px 10px; border-radius:6px; width:auto; margin-left: 5px;}
    .edit-btn{ background:#f59e0b; color:white; border:none; padding:5px 10px; border-radius:6px; width:auto; }
    .loading-text { text-align: center; color: #666; font-size: 14px; }
    .cancel-btn { background:#94a3b8; margin-top: 5px; }
</style>
</head>
<body>

<header>
    <a href="top.html" class="back-btn">＜ 戻る</a>
    📚 教員タスク管理
</header>

<div class="container">
    <div class="card">
        <h3 id="formTitle">タスク追加</h3>
        <input id="title" placeholder="タスク名">
        <select id="category"></select>
        <input type="date" id="deadline">
        <select id="priority">
            <option>高</option>
            <option>中</option>
            <option>低</option>
        </select>
        <textarea id="memo" rows="3" placeholder="メモ"></textarea>
        <button id="addBtn" onclick="saveTask()">追加</button>
        <button id="cancelBtn" class="cancel-btn" onclick="clearForm()" style="display:none;">キャンセル</button>
    </div>

    <div style="text-align: right; margin-bottom: 10px;">
        <a href="category.html" style="color:#2563eb; font-size:14px; text-decoration:none;">⚙ カテゴリと色を編集</a>
    </div>

    <div class="card">
        <h3>全端末共通タスクリスト</h3>
        <div id="taskList"><p class="loading-text">データを読み込み中...</p></div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://klewsfgafeixuvghkkvi.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let tasks = [];
let editingId = null; // 編集中のタスクIDを保持

// カテゴリデータの初期化
function getCategoryData() {
    let data = JSON.parse(localStorage.getItem("teacherCategories"));
    if (!data) {
        data = [
            {name: "学級経営", color: "#e11d48"}, {name: "授業準備", color: "#2563eb"},
            {name: "校務分掌", color: "#059669"}, {name: "生徒指導", color: "#d97706"},
            {name: "保護者対応", color: "#7c3aed"}, {name: "研修", color: "#db2777"},
            {name: "日本人学校", color: "#4b5563"}, {name: "その他", color: "#94a3b8"}
        ];
        localStorage.setItem("teacherCategories", JSON.stringify(data));
    }
    return data;
}

function loadCategories(){
    const select = document.getElementById("category");
    const categories = getCategoryData();
    select.innerHTML = "";
    categories.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.name;
        opt.textContent = c.name;
        select.appendChild(opt);
    });
}

async function fetchTasks() {
    const { data, error } = await _supabase.from('tasks').select('*');
    if (error) {
        document.getElementById("taskList").innerHTML = "エラーが発生しました";
        return;
    }
    tasks = data;
    renderTasks();
}

// 保存ボタン（新規・更新共通）
async function saveTask(){
    const titleInput = document.getElementById("title");
    const title = titleInput.value;
    const btn = document.getElementById("addBtn");
    
    if(title === ""){ alert("タスク名を入力してください"); return; }
    
    btn.disabled = true;
    btn.innerText = "送信中...";

    const taskData = {
        title: title,
        category: document.getElementById("category").value,
        deadline: document.getElementById("deadline").value || null,
        priority: document.getElementById("priority").value,
        memo: document.getElementById("memo").value,
        done: false
    };

    let error;
    if (editingId) {
        // 更新モード
        const { error: updateError } = await _supabase.from('tasks').update(taskData).eq('id', editingId);
        error = updateError;
    } else {
        // 新規作成モード
        const { error: insertError } = await _supabase.from('tasks').insert([taskData]);
        error = insertError;
    }

    if (error) { 
        alert("保存に失敗しました"); 
    } else {
        clearForm();
        await fetchTasks(); 
    }
    btn.disabled = false;
}

    if (!task) return;

    document.getElementById("category").value = task.category;
