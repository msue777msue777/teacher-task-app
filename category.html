<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カテゴリ編集</title>
<style>
    body{ font-family:sans-serif; margin:0; background:#f5f7fa; }
    header{ background:#2563eb; color:white; text-align:center; padding:15px; font-size:20px; font-weight:bold; position: relative; }
    .back-btn { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: white; text-decoration: none; font-size: 16px; }
    .container{ padding:15px; }
    .add-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .input-group { display: flex; gap: 10px; align-items: center; }
    input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    input[type="color"] { width: 50px; height: 40px; border: none; background: none; cursor: pointer; }
    .add-btn{ background:#2563eb; color:white; padding:10px 20px; border-radius:8px; border:none; cursor: pointer; font-weight: bold; }
    .category-card{ background:white; border-radius:10px; padding:12px; margin-bottom:12px; border:1px solid #cbd5e1; display:flex; justify-content:space-between; align-items:center; }
    .cat-info { display: flex; align-items: center; gap: 12px; }
    .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 1px solid #ddd; }
    .delete-btn{ background:#ef4444; color:white; border:none; padding:6px 12px; border-radius:6px; cursor: pointer; }
</style>
</head>
<body>
<header>
    <a href="index.html" class="back-btn">＜ 戻る</a>
    カテゴリ・色 編集
</header>
<div class="container">
    <div class="add-card">
        <p style="margin:0 0 10px 0; font-size:14px; font-weight:bold;">新規追加</p>
        <div class="input-group">
            <input type="text" id="newCatName" placeholder="カテゴリ名">
            <input type="color" id="newCatColor" value="#2563eb">
            <button class="add-btn" onclick="addCategory()">追加</button>
        </div>
    </div>
    <div id="categoryList"></div>
</div>

<script>
function getCategories() {
    let data = JSON.parse(localStorage.getItem("teacherCategories"));
    if (data && data.length > 0 && typeof data[0] === 'string') {
        data = data.map(name => ({ name: name, color: "#2563eb" }));
    }
    return data || [];
}

function renderCategories(){
    const list = document.getElementById("categoryList");
    const categories = getCategories();
    list.innerHTML = "";
    categories.forEach((cat, index)=>{
        const div = document.createElement("div");
        div.className = "category-card";
        div.innerHTML = `
            <div class="cat-info">
                <div class="color-dot" style="background:${cat.color}"></div>
                <span class="category-name" style="font-weight:bold; color:#334155;">${cat.name}</span>
            </div>
            <button class="delete-btn" onclick="deleteCategory(${index})">削除</button>
        `;
        list.appendChild(div);
    });
}

function addCategory(){
    const nameInput = document.getElementById("newCatName");
    const colorInput = document.getElementById("newCatColor");
    const name = nameInput.value.trim();
    if(!name) return;
    const categories = getCategories();
    categories.push({ name: name, color: colorInput.value });
    localStorage.setItem("teacherCategories", JSON.stringify(categories));
    nameInput.value = "";
    renderCategories();
}

function deleteCategory(index){
    if(!confirm("削除しますか？")) return;
    const categories = getCategories();
    categories.splice(index, 1);
    localStorage.setItem("teacherCategories", JSON.stringify(categories));
    renderCategories();
}

renderCategories();
</script>
</body>
</html>
