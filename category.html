<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カテゴリ編集</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    background:#f5f7fa;
}

header{
    background:#2563eb;
    color:white;
    text-align:center;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.container{
    padding:15px;
}

.add-btn{
    background:#2563eb;
    color:white;
    padding:10px 15px;
    border-radius:8px;
    border:none;
    font-size:14px;
    margin-bottom:15px;
}

.category-card{
    background:white;
    border-radius:10px;
    padding:12px;
    margin-bottom:12px;
    border:2px solid #cbd5e1;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.category-name{
    font-size:16px;
    color:#475569;
}

.delete-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:6px;
}
</style>
</head>

<body>

<header>カテゴリ編集</header>

<div class="container">

    <button class="add-btn" onclick="addCategory()">＋カテゴリ追加</button>

    <div id="categoryList"></div>

</div>

<script>
// 初期カテゴリがなければ作成
if(!localStorage.getItem("teacherCategories")){
    localStorage.setItem("teacherCategories", JSON.stringify([
        "学級経営",
        "授業準備",
        "校務分掌",
        "生徒指導",
        "保護者対応",
        "研修",
        "日本人学校",
        "その他"
    ]));
}

// カテゴリ一覧を表示
function renderCategories(){
    const list = document.getElementById("categoryList");
    const categories = JSON.parse(localStorage.getItem("teacherCategories")) || [];

    list.innerHTML = "";

    categories.forEach((c, index)=>{
        const div = document.createElement("div");
        div.className = "category-card";

        div.innerHTML = `
            <span class="category-name">${c}</span>
            <button class="delete-btn" onclick="deleteCategory(${index})">削除</button>
        `;

        list.appendChild(div);
    });
}

// カテゴリ追加
function addCategory(){
    const name = prompt("新しいカテゴリ名を入力してください");
    if(!name || name.trim() === "") return;

    const categories = JSON.parse(localStorage.getItem("teacherCategories")) || [];
    categories.push(name.trim());

    localStorage.setItem("teacherCategories", JSON.stringify(categories));
    renderCategories();
}

// カテゴリ削除
function deleteCategory(index){
    if(!confirm("削除しますか？")) return;

    const categories = JSON.parse(localStorage.getItem("teacherCategories")) || [];
    categories.splice(index, 1);

    localStorage.setItem("teacherCategories", JSON.stringify(categories));
    renderCategories();
}

renderCategories();
</script>

</body>
</html>
