<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週案・月案・時数管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .print-area { display: block !important; width: 100%; border: none; }
            table { border-collapse: collapse; width: 100%; border: 1px solid black !important; }
            th, td { border: 1px solid black !important; color: black !important; }
        }
        .input-flat { width: 100%; border: none; background: transparent; font-size: 0.75rem; padding: 2px; }
        .input-flat:focus { background: white; outline: 1px solid #6366f1; }
    </style>
</head>
<body class="bg-slate-50 p-2">

    <!-- 画面操作メニュー (印刷されない) -->
    <div id="ui-panel" class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden no-print mb-8">
        <!-- ヘッダー -->
        <div class="bg-indigo-700 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <div>
                <h1 id="view-title" class="text-xl font-bold flex items-center">🗓️ 週案・時数管理</h1>
                <p id="save-status" class="text-[10px] bg-indigo-800 px-2 py-0.5 rounded-full inline-block mt-1">接続中...</p>
            </div>
            
            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="setView('edit')" class="bg-white/20 px-3 py-1 rounded text-sm hover:bg-white/30">週案入力</button>
                <button onclick="setView('monthly')" class="bg-blue-600 px-3 py-1 rounded text-sm hover:bg-blue-700">行事・備考入力</button>
                <button onclick="setView('base')" class="bg-orange-500 px-3 py-1 rounded text-sm hover:bg-orange-600 font-bold text-white">固定時間割設定</button>
                <button onclick="setView('print')" class="bg-emerald-600 px-3 py-1 rounded text-sm font-bold">月案印刷表示</button>
            </div>
        </div>

        <!-- コントロールパネル -->
        <div id="controls" class="p-4 border-b flex justify-between items-center bg-indigo-50">
            <div id="week-nav" class="flex items-center gap-4">
                <button onclick="changeWeek(-7)" class="text-indigo-600 font-bold px-2">◀ 前週</button>
                <span id="current-week-label" class="text-lg font-black text-indigo-900 w-32 text-center">---</span>
                <button onclick="changeWeek(7)" class="text-indigo-600 font-bold px-2">次週 ▶</button>
            </div>
            <button onclick="applyBaseSchedule()" id="apply-base-btn" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm shadow-md hover:bg-indigo-700 transition">
                この週に固定時間割を適用
            </button>
        </div>

        <!-- メインタブ入力テーブル -->
        <div class="overflow-x-auto p-2">
            <table class="w-full border-collapse border border-slate-300 table-fixed">
                <thead>
                    <tr id="table-header" class="bg-slate-100 text-[10px] text-slate-500 uppercase"></tr>
                </thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>

        <!-- 時数集計 -->
        <div id="summary-view" class="bg-slate-50 p-4 md:p-6 border-t">
            <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        </div>
    </div>

    <!-- 印刷用 月案レイアウト (画像に基づいた形式) -->
    <div id="print-view" class="hidden bg-white p-4 mx-auto print-area" style="max-width: 1000px;">
        <!-- 判子欄 -->
        <div class="flex justify-start mb-2">
            <table class="w-auto border-collapse mb-2" style="width: 240px; border: 1px solid black;">
                <tr class="text-[9px] text-center">
                    <td class="border border-black w-12 h-5">校長</td>
                    <td class="border border-black w-12">教頭</td>
                    <td class="border border-black w-12">教務</td>
                    <td class="border border-black w-12">担任</td>
                </tr>
                <tr>
                    <td class="border border-black h-12"></td>
                    <td class="border border-black"></td>
                    <td class="border border-black"></td>
                    <td class="border border-black"></td>
                </tr>
            </table>
        </div>
        <!-- タイトル -->
        <div class="text-center mb-4">
            <h2 class="text-2xl font-bold tracking-[1em]">5月学習指導計画表</h2>
        </div>
        <!-- メイン表 -->
        <table class="w-full border-collapse border-2 border-black text-[9px]">
            <thead>
                <tr class="bg-gray-50">
                    <th class="border border-black w-8 p-1">日</th>
                    <th class="border border-black w-6 p-1">曜</th>
                    <th class="border border-black w-32 p-1 text-left">行事・朝の活動</th>
                    <th class="border border-black">1</th>
                    <th class="border border-black">2</th>
                    <th class="border border-black">3</th>
                    <th class="border border-black">4</th>
                    <th class="border border-black">5</th>
                    <th class="border border-black">6</th>
                    <th class="border border-black w-24 p-1">備考</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
        <div class="mt-4 no-print text-center">
            <button onclick="window.print()" class="bg-blue-600 text-white px-10 py-3 rounded-full font-bold shadow-lg">印刷・PDF保存する</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMonday = new Date('2026-05-11'); 
        let subjects = [], units = [], currentMode = 'edit';

        async function init() {
            try {
                const [{ data: subData }, { data: unitData }, { data: plans }] = await Promise.all([
                    _supabase.from('subjects').select('*').order('display_order'),
                    _supabase.from('units').select('*'),
                    _supabase.from('yearly_plans').select('*').eq('month', 5)
                ]);
                subjects = subData || [];
                units = unitData || [];
                window.plans = plans || [];
                await refreshData();
            } catch (e) {
                console.error("Init Error:", e);
            }
        }

        function setView(mode) {
            currentMode = mode;
            document.getElementById('view-title').innerText = 
                mode === 'edit' ? "🗓️ 週案入力" : 
                mode === 'monthly' ? "📋 行事・備考入力" : 
                mode === 'base' ? "⚙️ 固定時間割設定" : "📄 月案プレビュー";
            
            document.getElementById('controls').classList.toggle('hidden', mode === 'print' || mode === 'base' || mode === 'monthly');
            document.getElementById('summary-view').classList.toggle('hidden', mode === 'print' || mode === 'monthly');
            document.getElementById('print-view').classList.toggle('hidden', mode !== 'print');
            document.getElementById('ui-panel').classList.toggle('hidden', mode === 'print');
            
            if (mode === 'print') renderPrintView();
            else refreshData();
        }

        async function refreshData() {
            document.getElementById('save-status').innerText = '同期中...';
            
            const { data: schData } = await _supabase.from('schedules').select('*');
            const { data: baseData } = await _supabase.from('base_schedules').select('*');
            const { data: noteData } = await _supabase.from('daily_notes').select('*');

            const body = document.getElementById('schedule-body');
            const header = document.getElementById('table-header');
            body.innerHTML = '';
            header.innerHTML = '';

            if (currentMode === 'edit') {
                const weekDays = [];
                for(let i=0; i<5; i++) {
                    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                    weekDays.push(d.toISOString().split('T')[0]);
                }
                header.innerHTML = '<th class="p-2 w-10 text-[10px]">校時</th>';
                weekDays.forEach((date, i) => header.innerHTML += `<th class="p-2 text-center font-bold text-[10px]">${date.split('-')[2]}日(${["月","火","水","木","金"][i]})</th>`);

                for (let p = 1; p <= 6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border border-slate-200 p-2 bg-slate-50 text-center font-bold text-slate-400 text-xs">${p}</td>`;
                    weekDays.forEach(dateStr => {
                        const cell = schData?.find(d => d.date === dateStr && d.period === p);
                        tr.appendChild(createCell(dateStr, p, cell));
                    });
                    body.appendChild(tr);
                }
                renderSummary(schData || [], window.plans);
                document.getElementById('current-week-label').innerText = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日週`;

            } else if (currentMode === 'monthly') {
                header.innerHTML = '<th class="p-1 w-16">日付</th><th class="p-1">行事・朝の活動</th><th class="p-1">備考</th>';
                for (let i = 1; i <= 31; i++) {
                    const ds = `2026-05-${String(i).padStart(2, '0')}`;
                    const n = noteData?.find(x => x.date === ds);
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="border p-2 text-center bg-slate-50 font-bold text-xs">${i}日</td>
                        <td class="border p-0"><input class="input-flat p-2 text-xs" value="${n?.event || ''}" onblur="saveNote('${ds}','event',this.value)" placeholder="..."></td>
                        <td class="border p-0"><input class="input-flat p-2 text-xs" value="${n?.remark || ''}" onblur="saveNote('${ds}','remark',this.value)" placeholder="..."></td>
                    `;
                    body.appendChild(tr);
                }
            } else if (currentMode === 'base') {
                header.innerHTML = '<th class="p-2 w-10 font-bold text-orange-600 text-xs">校時</th>';
                ["月", "火", "水", "木", "金"].forEach(d => header.innerHTML += `<th class="p-2 font-bold text-orange-600 text-xs">${d}曜日</th>`);
                for (let p = 1; p <= 6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-2 border border-slate-200 bg-orange-50 font-bold text-center text-orange-300 text-xs">${p}</td>`;
                    for (let dw = 1; dw <= 5; dw++) {
                        const cell = baseData?.find(d => d.day_of_week === dw && d.period === p);
                        tr.appendChild(createBaseCell(dw, p, cell));
                    }
                    body.appendChild(tr);
                }
            }
            document.getElementById('save-status').innerText = 'クラウド接続済み';
        }

        function createCell(date, period, cell) {
            const td = document.createElement('td');
            td.className = "border border-slate-200 p-1 h-32 align-top hover:bg-indigo-50";
            const subOptions = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
            const filteredUnits = units.filter(u => u.subject_id === cell?.subject_id);
            const unitOptions = filteredUnits.map(u => `<option value="${u.id}" ${cell?.unit_id === u.id ? 'selected' : ''}>${u.unit_name}</option>`).join('');
            td.innerHTML = `
                <select onchange="saveData('${date}', ${period}, this.value)" class="w-full text-[10px] font-bold text-indigo-800 bg-transparent outline-none mb-1">
                    <option value="">--</option>${subOptions}
                </select>
                <select onchange="saveUnit('${date}', ${period}, this.value)" class="w-full text-[9px] bg-indigo-50 text-indigo-600 rounded mb-1 outline-none ${!cell?.subject_id ? 'hidden' : ''}">
                    <option value="">--単元--</option>${unitOptions}
                </select>
                <textarea onblur="updateMemo('${date}', ${period}, this.value)" class="w-full text-[9px] leading-tight h-16 bg-transparent border-none resize-none outline-none focus:bg-white p-1" placeholder="備考...">${cell?.memo || ''}</textarea>
            `;
            return td;
        }

        function createBaseCell(dw, p, cell) {
            const td = documen
