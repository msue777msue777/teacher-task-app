<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週案・月案管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .print-area { display: block !important; width: 100%; border: none; padding: 10mm; }
            table { border-collapse: collapse; width: 100%; border: 1px solid black !important; }
            th, td { border: 1px solid black !important; color: black !important; }
        }
        .input-flat { width: 100%; border: none; background: transparent; font-size: 0.75rem; padding: 2px; }
        .input-flat:focus { background: white; outline: 1px solid #6366f1; }
    </style>
</head>
<body class="bg-slate-50 p-2">

    <div id="ui-container" class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden no-print">
        <!-- ヘッダー -->
        <div class="bg-indigo-700 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <div>
                <h1 id="view-title" class="text-xl font-bold flex items-center">🗓️ 週案・時数管理</h1>
                <p id="save-status" class="text-[10px] bg-indigo-800 px-2 py-0.5 rounded-full inline-block mt-1 font-mono">Cloud Connected</p>
            </div>
            
            <div class="flex flex-wrap gap-2 justify-center text-xs">
                <button onclick="setView('edit')" class="bg-white/20 px-3 py-1 rounded hover:bg-white/30 transition">週案入力</button>
                <button onclick="setView('monthly')" class="bg-blue-600 px-3 py-1 rounded hover:bg-blue-500 transition">行事・備考入力</button>
                <button onclick="setView('base')" class="bg-orange-500 px-3 py-1 rounded hover:bg-orange-600 font-bold transition">固定時間割設定</button>
                <button onclick="setView('print')" class="bg-emerald-500 px-3 py-1 rounded font-bold hover:bg-emerald-600 transition">月案印刷表示</button>
            </div>
        </div>

        <!-- 週案用コントロールパネル -->
        <div id="controls" class="p-4 border-b flex justify-between items-center bg-indigo-50">
            <div class="flex items-center gap-4">
                <button onclick="changeWeek(-7)" class="text-indigo-600 font-bold px-2 hover:bg-indigo-100 rounded text-xl">◀</button>
                <span id="current-week-label" class="text-lg font-black text-indigo-900 w-40 text-center">---</span>
                <button onclick="changeWeek(7)" class="text-indigo-600 font-bold px-2 hover:bg-indigo-100 rounded text-xl">▶</button>
            </div>
            <button onclick="applyBaseSchedule()" id="apply-base-btn" class="bg-indigo-600 text-white px-4 py-1.5 rounded-lg text-sm shadow-md hover:bg-indigo-700 transition">
                この週に固定時間割を適用
            </button>
        </div>

        <!-- メイン入力テーブル -->
        <div id="edit-view" class="overflow-x-auto p-2">
            <table class="w-full border-collapse border border-slate-300 table-fixed">
                <thead>
                    <tr id="table-header" class="bg-slate-100 text-[10px] text-slate-500 uppercase tracking-wider">
                        <th class="border border-slate-300 p-2 w-10 text-center text-xs">校時</th>
                    </tr>
                </thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>

        <!-- 月案行事入力テーブル (追加) -->
        <div id="monthly-view" class="hidden overflow-x-auto p-2">
            <table class="w-full border-collapse border border-slate-300">
                <thead class="bg-slate-100 text-xs">
                    <tr><th class="border p-2 w-20">日付</th><th class="border p-2">行事・朝の活動</th><th class="border p-2 w-48">備考</th></tr>
                </thead>
                <tbody id="monthly-body"></tbody>
            </table>
        </div>

        <!-- 時数集計 -->
        <div id="summary-view" class="bg-slate-50 p-4 md:p-6 border-t">
            <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-3"></div>
        </div>
    </div>

    <!-- 印刷用 月案レイアウト (画像に基づいた形式) -->
    <div id="print-view" class="hidden bg-white p-4 mx-auto print-area" style="max-width: 1000px;">
        <!-- 印影欄 -->
        <div class="flex justify-start mb-2">
            <table class="w-auto border-collapse" style="width: 240px; border: 1px solid black;">
                <tr class="text-[9px] text-center">
                    <td class="border border-black w-12 h-5">校長</td>
                    <td class="border border-black w-12">教頭</td>
                    <td class="border border-black w-12">教務</td>
                    <td class="border border-black w-12">担任</td>
                </tr>
                <tr><td class="border border-black h-12"></td><td class="border border-black h-12"></td><td class="border border-black h-12"></td><td class="border border-black h-12"></td></tr>
            </table>
        </div>
        <div class="text-center mb-4">
            <h2 class="text-3xl font-bold tracking-[1em] relative left-[0.5em]">5月学習指導計画表</h2>
        </div>
        <table class="w-full border-collapse border-2 border-black text-[9px]">
            <thead>
                <tr class="bg-gray-100 text-center font-bold">
                    <th class="border border-black w-10 p-1">日(曜)</th>
                    <th class="border border-black w-32 p-1">行事・朝の活動</th>
                    <th class="border border-black">1</th><th class="border border-black">2</th><th class="border border-black">3</th>
                    <th class="border border-black">4</th><th class="border border-black">5</th><th class="border border-black">6</th>
                    <th class="border border-black w-32 p-1">備考</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
        <div class="mt-8 no-print text-center">
            <button onclick="window.print()" class="bg-blue-600 text-white px-10 py-3 rounded-full font-bold shadow-lg">印刷・PDF保存する</button>
            <button onclick="setView('edit')" class="ml-4 text-slate-400 underline">戻る</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMonday = new Date('2026-05-11'); 
        let subjects = [], units = [], currentMode = 'edit';

        async function init() {
            try {
                const [{ data: subData }, { data: unitData }, { data: plans }] = await Promise.all([
                    _supabase.from('subjects').select('*').order('display_order'),
                    _supabase.from('units').select('*'),
                    _supabase.from('yearly_plans').select('*').eq('month', 5)
                ]);
                subjects = subData || [];
                units = unitData || [];
                window.plans = plans || [];
                await refreshData();
            } catch (e) { console.error("初期化エラー:", e); }
        }

        function setView(mode) {
            currentMode = mode;
            document.getElementById('view-title').innerText = 
                mode === 'edit' ? "🗓️ 週案入力" : 
                mode === 'monthly' ? "📋 行事・備考入力" : 
                mode === 'base' ? "⚙️ 固定時間割設定" : "📄 月案印刷プレビュー";

            document.getElementById('edit-view').classList.toggle('hidden', mode === 'print' || mode === 'monthly');
            document.getElementById('monthly-view').classList.toggle('hidden', mode !== 'monthly');
            document.getElementById('summary-view').classList.toggle('hidden', mode === 'print' || mode === 'monthly');
            document.getElementById('controls').classList.toggle('hidden', mode !== 'edit');
            document.getElementById('print-view').classList.toggle('hidden', mode !== 'print');
            document.getElementById('ui-container').classList.toggle('hidden', mode === 'print');
            
            refreshData();
        }

        async function refreshData() {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = 'Syncing...';
            
            const { data: schData } = await _supabase.from('schedules').select('*');
            const { data: baseData } = await _supabase.from('base_schedules').select('*');
            const { data: noteData } = await _supabase.from('daily_notes').select('*');

            const body = document.getElementById('schedule-body');
            const header = document.getElementById('table-header');
            body.innerHTML = '';

            if (currentMode === 'edit') {
                const weekDays = [];
                for(let i=0; i<5; i++) {
                    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                    weekDays.push(d.toISOString().split('T')[0]);
                }
                header.innerHTML = '<th class="p-2 w-10 text-xs">校時</th>';
                weekDays.forEach((date, i) => header.innerHTML += `<th class="p-2 text-center font-bold text-xs">${date.split('-')[2]}日(${["月","火","水","木","金"][i]})</th>`);

                for (let p = 1; p <= 6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border border-slate-200 p-2 bg-slate-50 text-center font-bold text-slate-400 text-xs">${p}</td>`;
                    weekDays.forEach(dateStr => {
                        const cell = schData?.find(d => d.date === dateStr && d.period === p);
                        tr.appendChild(createCell(dateStr, p, cell));
                    });
                    body.appendChild(tr);
                }
                renderSummary(schData || [], window.plans);
                document.getElementById('current-week-label').innerText = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日週`;

            } else if (currentMode === 'base') {
                header.innerHTML = '<th class="p-2 w-10 text-xs text-orange-600 font-bold">校時</th>';
                ["月", "火", "水", "木", "金"].forEach(d => header.innerHTML += `<th class="p-2 text-xs text-orange-600 font-bold">${d}曜日</th>`);
                for (let p = 1; p <= 6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border border-slate-200 p-2 bg-orange-50 text-center font-bold text-orange-300 text-xs">${p}</td>`;
                    for (let dw = 1; dw <= 5; dw++) {
                        const cell = baseData?.find(d => d.day_of_week === dw && d.period === p);
                        tr.appendChild(createBaseCell(dw, p, cell));
                    }
                    body.appendChild(tr);
                }
            } else if (currentMode === 'monthly') {
                const mBody = document.getElementById('monthly-body');
                mBody.innerHTML = '';
                for (let i = 1; i <= 31; i++) {
                    const ds = `2026-05-${String(i).padStart(2,'0')}`;
                    const n = noteData?.find(x => x.date === ds);
                    mBody.innerHTML += `<tr><td class="border p-2 text-center bg-slate-50 text-xs font-bold">${i}日</td>
                        <td class="border p-0"><input class="input-flat p-2" value="${n?.event || ''}" onblur="saveNote('${ds}','event',this.value)"></td>
                        <td class="border p-0"><input class="input-flat p-2" value="${n?.remark || ''}" onblur="saveNote('${ds}','remark',this.value)"></td></tr>`;
                }
            } else if (currentMode === 'print') {
                renderPrintView(schData, noteData);
            }
            statusEl.innerText = 'Connected';
        }

        function createCell(date, period, cell) {
            const td = document.createElement('td');
            td.className = "border border-slate-200 p-1 h-32 align-top hover:bg-indigo-50";
            const subOpt = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
            const filteredUnits = units.filter(u => u.subject_id === cell?.subject_id);
            const unitOpt = filteredUnits.map(u => `<option value="${u.id}" ${cell?.unit_id === u.id ? 'selected' : ''}>${u.unit_name}</option>`).join('');
            td.innerHTML = `<select onchange="saveData('${date}', ${period}, this.value)" class="w-full text-xs font-bold mb-1 text-indigo-800 outline-none bg-transparent">${subOpt}<option value="" ${!cell?.subject_id?'selected':''}>--</option></select>
                <select onchange="saveUnit('${date}', ${period}, this.value)" class="w-full text-[9px] bg-indigo-50 text-i
