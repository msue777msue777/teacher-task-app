<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週案・月案・時数管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 印刷設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; margin: 0; }
            .print-area { display: block !important; width: 100%; border: none; padding: 0; }
            table { border-collapse: collapse; width: 100%; border: 1px solid black !important; }
            th, td { border: 1px solid black !important; color: black !important; padding: 2px !important; }
        }
        /* 画面入力用 */
        .input-flat { width: 100%; border: none; background: transparent; font-size: 0.75rem; padding: 4px; }
        .input-flat:focus { background: white; outline: 1px solid #6366f1; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-4 text-slate-800">

    <!-- 画面操作パネル（印刷時は非表示） -->
    <div id="ui-container" class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden no-print mb-8 border border-slate-200">
        <!-- ヘッダー -->
        <div class="bg-slate-800 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <div>
                <h1 id="view-title" class="text-xl font-bold flex items-center">🗓️ 週案入力</h1>
                <p id="save-status" class="text-[10px] bg-slate-700 px-2 py-0.5 rounded-full inline-block mt-1 font-mono text-emerald-400">Ready</p>
            </div>
            <div class="flex flex-wrap gap-2 justify-center">
                <button onclick="setView('edit')" class="bg-indigo-600 px-3 py-1 rounded text-sm hover:bg-indigo-500 transition">週案入力</button>
                <button onclick="setView('monthly')" class="bg-blue-600 px-3 py-1 rounded text-sm hover:bg-blue-500 transition">月案行事</button>
                <button onclick="setView('base')" class="bg-orange-500 px-3 py-1 rounded text-sm hover:bg-orange-600 font-bold transition">固定時間割</button>
                <button onclick="setView('print')" class="bg-emerald-600 px-3 py-1 rounded text-sm font-bold hover:bg-emerald-500 transition">印刷表示</button>
            </div>
        </div>

        <!-- 週ナビゲーション（週案モード時のみ） -->
        <div id="week-controls" class="p-3 border-b flex justify-between items-center bg-slate-50">
            <button onclick="changeWeek(-7)" class="text-indigo-600 font-bold px-4 py-1 border border-indigo-200 rounded hover:bg-white transition">◀ 前週</button>
            <span id="current-week-label" class="text-lg font-black text-slate-700 w-40 text-center">---</span>
            <button onclick="changeWeek(7)" class="text-indigo-600 font-bold px-4 py-1 border border-indigo-200 rounded hover:bg-white transition">次週 ▶</button>
            <button onclick="applyBaseSchedule()" class="ml-4 bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold hover:bg-indigo-200 transition">固定時間割を適用</button>
        </div>

        <!-- メインタブ入力テーブル -->
        <div class="overflow-x-auto p-2">
            <table class="w-full table-fixed bg-white">
                <thead id="main-table-head" class="bg-slate-100 text-[10px] text-slate-500 uppercase"></thead>
                <tbody id="main-table-body"></tbody>
            </table>
        </div>

        <!-- 時数集計 -->
        <div id="summary-view" class="p-4 border-t bg-slate-50">
            <h2 class="text-[10px] font-bold text-slate-400 mb-2 tracking-widest uppercase">Monthly Progress</h2>
            <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2"></div>
        </div>
    </div>

    <!-- 印刷用 月案レイアウト (画像フォーマットを再現) -->
    <div id="print-view" class="hidden bg-white print-area mx-auto max-w-[1000px]">
        <div class="flex justify-start mb-2">
            <table class="w-auto border-collapse" style="width: 280px; border: 1.5px solid black;">
                <tr class="text-[10px] text-center font-bold">
                    <td class="border border-black w-14 h-6">校長</td>
                    <td class="border border-black w-14">教頭</td>
                    <td class="border border-black w-14">教務</td>
                    <td class="border border-black w-14">担任</td>
                </tr>
                <tr><td class="border border-black h-14"></td><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td></tr>
            </table>
        </div>
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold tracking-[1.2em] underline underline-offset-8">5月学習指導計画表</h2>
        </div>
        <table class="w-full border-collapse border-2 border-black text-[10px]">
            <thead>
                <tr class="bg-gray-100 text-center font-bold">
                    <th class="border border-black w-12 p-2">日(曜)</th>
                    <th class="border border-black w-40 p-2">行事・朝の活動</th>
                    <th class="border border-black">1</th><th class="border border-black">2</th><th class="border border-black">3</th>
                    <th class="border border-black">4</th><th class="border border-black">5</th><th class="border border-black">6</th>
                    <th class="border border-black w-32 p-2">備考</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
        <div class="mt-8 no-print text-center">
            <button onclick="window.print()" class="bg-blue-600 text-white px-12 py-3 rounded-full font-bold shadow-lg">この内容で印刷・PDF保存</button>
            <button onclick="setView('edit')" class="ml-4 text-slate-400 underline">入力画面に戻る</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMonday = new Date('2026-05-11'); 
        let subjects = [], units = [], currentMode = 'edit';

        async function init() {
            try {
                const [{ data: s }, { data: u }, { data: p }] = await Promise.all([
                    _supabase.from('subjects').select('*').order('display_order'),
                    _supabase.from('units').select('*'),
                    _supabase.from('yearly_plans').select('*').eq('month', 5)
                ]);
                subjects = s || []; units = u || []; window.plans = p || [];
                await render();
            } catch (err) {
                document.getElementById('save-status').innerText = "初期化エラー: " + err.message;
            }
        }

        async function setView(mode) {
            currentMode = mode;
            await render();
        }

        async function render() {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = "Syncing...";
            
            const { data: sch } = await _supabase.from('schedules').select('*');
            const { data: base } = await _supabase.from('base_schedules').select('*');
            const { data: notes } = await _supabase.from('daily_notes').select('*');

            const head = document.getElementById('main-table-head');
            const body = document.getElementById('main-table-body');
            const printView = document.getElementById('print-view');
            const uiContainer = document.getElementById('ui-container');
            const weekCtrl = document.getElementById('week-controls');
            const summary = document.getElementById('summary-view');

            // 表示の初期化
            head.innerHTML = ""; body.innerHTML = "";
            printView.classList.add('hidden');
            uiContainer.classList.remove('hidden');
            weekCtrl.classList.add('hidden');
            summary.classList.add('hidden');

            if (currentMode === 'print') {
                uiContainer.classList.add('hidden');
                printView.classList.remove('hidden');
                renderPrintLayout(sch, notes);
                return;
            }

            if (currentMode === 'edit') {
                document.getElementById('view-title').innerText = "🗓️ 週案入力モード";
                weekCtrl.classList.remove('hidden');
                summary.classList.remove('hidden');

                const weekDays = [];
                for(let i=0; i<5; i++) {
                    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                    weekDays.push(d.toISOString().split('T')[0]);
                }
                
                head.innerHTML = `<tr><th class="border p-2 w-12">校時</th>${weekDays.map((d,i)=>`<th class="border p-1 text-center font-bold">${d.split('-')[2]}日(${['月','火','水','木','金'][i]})</th>`).join('')}</tr>`;

                for(let p=1; p<=6; p++){
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border bg-slate-50 text-center font-bold text-slate-400 text-xs">${p}</td>`;
                    weekDays.forEach(date => {
                        const cell = sch?.find(s => s.date === date && s.period === p);
                        tr.appendChild(createEditCell(date, p, cell));
                    });
                    body.appendChild(tr);
                }
                document.getElementById('current-week-label').innerText = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日週`;
                renderSummary(sch);

            } else if (currentMode === 'monthly') {
                document.getElementById('view-title').innerText = "📋 月案（行事・備考）入力";
                head.innerHTML = '<tr><th class="border p-2 w-20">日付</th><th class="border p-2">行事・朝の活動</th><th class="border p-2">備考</th></tr>';
                for(let i=1; i<=31; i++){
                    const ds = `2026-05-${String(i).padStart(2,'0')}`;
                    const n = notes?.find(x => x.date === ds);
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border p-2 text-center bg-slate-50 font-bold text-xs">${i}日</td>
                        <td class="border p-0"><input class="input-flat" value="${n?.event || ''}" onblur="saveNote('${ds}','event',this.value)" placeholder="行事入力をタップ..."></td>
                        <td class="border p-0"><input class="input-flat" value="${n?.remark || ''}" onblur="saveNote('${ds}','remark',this.value)" placeholder="備考入力をタップ..."></td>`;
                    body.appendChild(tr);
                }

            } else if (currentMode === 'base') {
                document.getElementById('view-title').innerText = "⚙️ 固定時間割（基本）設定";
                head.innerHTML = '<tr><th class="border p-2 w-12 text-orange-600">校時</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th></tr>';
                for(let p=1; p<=6; p++){
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border p-2 font-bold text-center bg-orange-50 text-orange-300">${p}</td>`;
                    for(let dw=1; dw<=5; dw++){
                        const cell = base?.find(x => x.day_of_week === dw && x.period === p);
                        tr.appendChild(createBaseCell(dw, p, cell));
                    }
                    body.appendChild(tr);
                }
            }
            statusEl.innerText = "Cloud Connected";
        }

        function createEditCell(date, period, cell) {
            const td = document.createElement('td');
            td.className = "border p-1 h-32 align-top hover:bg-indigo-50 transition";
            const subOpt = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
            const filteredUnits = units.filter(u => u.subject_id === cell?.subject_id);
