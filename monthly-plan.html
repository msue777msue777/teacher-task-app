<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月案・週案管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 印刷時の設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; margin: 0; }
            .print-area { 
                width: 100%; 
                margin: 0; 
                padding: 10mm; 
                box-shadow: none;
            }
            table { border-color: black !important; }
            th, td { border: 1px solid black !important; }
        }
        
        /* 画面表示用の入力補助スタイル */
        .input-flat { width: 100%; border: none; background: transparent; font-size: 0.75rem; padding: 2px; }
        .input-flat:focus { background: white; outline: 1px solid #3b82f6; }
        
        /* 表の基本スタイル */
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4">

    <!-- 画面操作用メニュー（印刷されない） -->
    <div class="max-w-[1200px] mx-auto bg-white shadow-lg rounded-lg overflow-hidden no-print mb-8">
        <div class="bg-slate-800 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <h1 class="text-xl font-bold">🗓️ 週案・月案・時数管理</h1>
            <div class="flex flex-wrap gap-2">
                <button onclick="setView('edit')" class="bg-indigo-600 px-4 py-1 rounded text-sm hover:bg-indigo-500">週案入力</button>
                <button onclick="setView('monthly')" class="bg-blue-600 px-4 py-1 rounded text-sm hover:bg-blue-500">行事・備考入力</button>
                <button onclick="setView('base')" class="bg-orange-600 px-4 py-1 rounded text-sm hover:bg-orange-500">固定時間割</button>
                <button onclick="setView('print')" class="bg-emerald-600 px-4 py-1 rounded text-sm hover:bg-emerald-500 font-bold">月案を印刷する</button>
            </div>
        </div>

        <!-- 週案用コントロール -->
        <div id="week-controls" class="p-4 border-b flex justify-between items-center bg-slate-50">
            <div class="flex items-center gap-4">
                <button onclick="changeWeek(-7)" class="text-indigo-600 font-bold px-2 text-xl">◀</button>
                <span id="current-week-label" class="text-lg font-black text-slate-700 w-40 text-center">---</span>
                <button onclick="changeWeek(7)" class="text-indigo-600 font-bold px-2 text-xl">▶</button>
            </div>
            <button onclick="applyBaseSchedule()" class="bg-indigo-100 text-indigo-700 px-4 py-1 rounded-lg text-xs font-bold">この週に固定時間割を適用</button>
        </div>

        <!-- メイン入力テーブル -->
        <div class="overflow-x-auto p-4">
            <table id="main-table" class="bg-white table-fixed">
                <thead><tr id="table-header" class="bg-slate-100 text-xs"></tr></thead>
                <tbody id="main-table-body"></tbody>
            </table>
        </div>

        <!-- 時数集計表示 -->
        <div id="summary-view" class="p-4 border-t bg-slate-50">
            <div id="summary-grid" class="grid grid-cols-2 md:grid-cols-7 gap-2 text-[10px]"></div>
        </div>
    </div>

    <!-- 印刷用 月案レイアウト -->
    <div id="print-view" class="hidden bg-white print-area mx-auto">
        <!-- 1. 印影欄 -->
        <div class="flex justify-start mb-2">
            <table class="w-auto border-collapse mb-2" style="width: 240px;">
                <tr>
                    <td class="border border-black text-[9px] text-center w-12 h-4">校長</td>
                    <td class="border border-black text-[9px] text-center w-12">教頭</td>
                    <td class="border border-black text-[9px] text-center w-12">教務</td>
                    <td class="border border-black text-[9px] text-center w-12">担任</td>
                </tr>
                <tr>
                    <td class="border border-black h-12"></td>
                    <td class="border border-black"></td>
                    <td class="border border-black"></td>
                    <td class="border border-black"></td>
                </tr>
            </table>
        </div>

        <!-- 2. タイトル -->
        <div class="text-center mb-4">
            <h2 class="text-2xl font-bold tracking-[1em] relative left-[0.5em]">5月学習指導計画表</h2>
        </div>

        <!-- 3. 月案メインテーブル -->
        <table class="w-full border-collapse border-2 border-black text-[9px]">
            <thead>
                <tr class="bg-gray-50">
                    <th class="border border-black w-8 p-1">日</th>
                    <th class="border border-black w-32 p-1 text-left">行事・朝の活動</th>
                    <th class="border border-black w-1/8">1</th>
                    <th class="border border-black w-1/8">2</th>
                    <th class="border border-black w-1/8">3</th>
                    <th class="border border-black w-1/8">4</th>
                    <th class="border border-black w-1/8">5</th>
                    <th class="border border-black w-1/8">6</th>
                    <th class="border border-black w-24 p-1">備考</th>
                </tr>
            </thead>
            <tbody id="print-table-body">
                <!-- JSで1日〜31日分生成 -->
            </tbody>
        </table>

        <!-- 印刷実行ボタン（画面上のみ） -->
        <div class="mt-8 no-print text-center">
            <button onclick="window.print()" class="bg-emerald-600 text-white px-12 py-3 rounded-full shadow-lg font-bold hover:bg-emerald-700">この形式で印刷・PDF保存する</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMonday = new Date('2026-05-11'); 
        let subjects = [], units = [], currentMode = 'edit';

        async function init() {
            const [{ data: subData }, { data: unitData }, { data: plans }] = await Promise.all([
                _supabase.from('subjects').select('*').order('display_order'),
                _supabase.from('units').select('*'),
                _supabase.from('yearly_plans').select('*').eq('month', 5)
            ]);
            subjects = subData || [];
            units = unitData || [];
            window.plans = plans || [];
            await refreshData();
        }

        function setView(mode) {
            currentMode = mode;
            document.getElementById('week-controls').classList.toggle('hidden', mode !== 'edit');
            document.getElementById('summary-view').classList.toggle('hidden', mode === 'print' || mode === 'monthly');
            document.getElementById('print-view').classList.toggle('hidden', mode !== 'print');
            document.querySelector('.no-print').classList.toggle('hidden', mode === 'print');
            
            if (mode === 'print') renderPrintView();
            else refreshData();
        }

        async function refreshData() {
            const { data: schData } = await _supabase.from('schedules').select('*');
            const { data: noteData } = await _supabase.from('daily_notes').select('*');
            const { data: baseData } = await _supabase.from('base_schedules').select('*');

            const body = document.getElementById('main-table-body');
            const header = document.getElementById('table-header');
            body.innerHTML = '';
            header.innerHTML = '';

            if (currentMode === 'edit') {
                const weekDays = [];
                for(let i=0; i<5; i++) {
                    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                    weekDays.push(d.toISOString().split('T')[0]);
                }
                header.innerHTML = '<th class="p-2 w-12">校時</th>';
                weekDays.forEach((date, i) => header.innerHTML += `<th class="p-2 text-center font-bold">${date.split('-')[2]}日(${["月","火","水","木","金"][i]})</th>`);

                for (let p = 1; p <= 6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-2 bg-slate-50 text-center font-bold text-slate-400 text-xs">${p}</td>`;
                    weekDays.forEach(dateStr => {
                        const cell = schData?.find(d => d.date === dateStr && d.period === p);
                        tr.appendChild(createCell(dateStr, p, cell));
                    });
                    body.appendChild(tr);
                }
                renderSummary(schData || [], window.plans);
                document.getElementById('current-week-label').innerText = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日週`;

            } else if (currentMode === 'monthly') {
                header.innerHTML = '<th class="w-16 p-1">日付</th><th class="w-48 p-1 text-blue-600">行事・朝の活動</th><th class="p-1">予定(週案連動)</th><th class="w-48 p-1 text-blue-600">備考</th>';
                for (let i = 1; i <= 31; i++) {
                    const dateStr = `2026-05-${String(i).padStart(2, '0')}`;
                    const note = noteData?.find(n => n.date === dateStr);
                    const dayLessons = schData?.filter(s => s.date === dateStr).sort((a,b)=>a.period-b.period);
                    const tr = document.createElement('tr');
                    const lessonText = dayLessons?.map(l => subjects.find(s => s.id === l.subject_id)?.name || '').join(' / ');
                    tr.innerHTML = `
                        <td class="p-1 text-center text-xs font-bold bg-slate-50">${i}日</td>
                        <td><input type="text" class="input-flat" value="${note?.event || ''}" onblur="saveNote('${dateStr}', 'event', this.value)"></td>
                        <td class="p-1 text-[10px] text-gray-400 italic">${lessonText || '-'}</td>
                        <td><input type="text" class="input-flat" value="${note?.remark || ''}" onblur="saveNote('${dateStr}', 'remark', this.value)"></td>
                    `;
                    body.appendChild(tr);
                }
            } else if (currentMode === 'base') {
                header.innerHTML = '<th class="p-2 w-12 font-bold text-orange-600">校時</th>';
                ["月", "火", "水", "木", "金"].forEach(d => header.innerHTML += `<th class="p-2 font-bold text-orange-600">${d}曜日</th>`);
                for (let p = 1; p <= 6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-2 bg-orange-50 text-center font-bold text-orange-300">${p}</td>`;
                    for (let dw = 1; dw <= 5; dw++) {
                        const cell = baseData?.find(d => d.day_of_week === dw && d.period === p);
                        tr.appendChild(createBaseCell(dw, p, cell));
                    }
                    body.appendChild(tr);
                }
            }
        }

        function createCell(date, period, cell) {
            const td = document.createElement('td');
            td.className = "p-1 h-32 align-top hover:bg-indigo-50";
            const subOptions = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
            const filteredUnits = units.filter(u => u.subject_id === cell?.subject_id);
            const unitOptions = filteredUnits.map(u => `<option value="${u.id}" ${cell?.unit_id === u.id ? 'selected' : ''}>${u.unit_name}</option>`).join('');
            td.innerHTML = `
                <select onchange="saveData('${date}', ${period}, this.value)" class="w-full text-[10px] font-bold mb-1 text-indigo-800 outline-none bg-transparent">
                    <option value="">--</option>${subOptions}
                </select>
                <select onchange="saveUnit('${date}', ${period}, this.value)" class="w-full text-[9px] bg-slate-50 mb-1 rounded p-0.5 outline-none ${!cell?.subject_id ? 'hidden' : ''}">
                    <option value="">--単元--</option>${unitOptions}
                </select>
                <textarea onblur="updateMemo('${date}', ${period}, this.value)" class="w-full text-[9px] leading-tight h-16 bg-transparent border-none resize-none outline-none font-sans" placeholder="備考...">${cell?.memo || ''}</textarea>
            `;
            return td;
        }

        function createBaseCell(dw, p, cell) {
            const td = document.createElement('td');
            td.className = "p-1 h-20 align-top bg-orange-50";
            const subOptions = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
            td.innerHTML = `<select onchange="saveBaseSchedule
