<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週案・月案・時数管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; }
            .print-area { display: block !important; width: 100%; border: none; padding: 10mm; }
            table { border-collapse: collapse; width: 100%; border: 1px solid black !important; }
            th, td { border: 1px solid black !important; color: black !important; padding: 2px !important; }
        }
        .input-flat { width: 100%; border: none; background: transparent; font-size: 0.75rem; padding: 4px; }
        .input-flat:focus { background: white; outline: 1px solid #6366f1; }
    </style>
</head>
<body class="bg-slate-50 p-2 md:p-4 text-slate-800">

    <!-- 操作パネル（印刷されない） -->
    <div id="ui-container" class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden no-print mb-8">
        <div class="bg-slate-800 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <div>
                <h1 id="view-title" class="text-xl font-bold">🗓️ 週案入力</h1>
                <p id="save-status" class="text-[10px] text-emerald-400">Ready</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="setView('edit')" class="bg-indigo-600 px-3 py-1 rounded text-sm hover:bg-indigo-500">週案入力</button>
                <button onclick="setView('monthly')" class="bg-blue-600 px-3 py-1 rounded text-sm hover:bg-blue-500 text-white">行事・備考入力</button>
                <button onclick="setView('base')" class="bg-orange-600 px-3 py-1 rounded text-sm hover:bg-orange-500">固定時間割</button>
                <button onclick="setView('print')" class="bg-emerald-600 px-3 py-1 rounded text-sm font-bold hover:bg-emerald-500">印刷表示</button>
            </div>
        </div>

        <div id="week-controls" class="p-3 border-b flex justify-between items-center bg-slate-50">
            <button onclick="changeWeek(-7)" class="text-indigo-600 font-bold px-4 py-1 border border-indigo-200 rounded">◀ 前週</button>
            <span id="current-week-label" class="text-lg font-black text-slate-700 w-40 text-center">---</span>
            <button onclick="changeWeek(7)" class="text-indigo-600 font-bold px-4 py-1 border border-indigo-200 rounded">次週 ▶</button>
            <button onclick="applyBaseSchedule()" class="ml-4 bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-xs font-bold">固定適用</button>
        </div>

        <div class="overflow-x-auto p-2">
            <table class="w-full table-fixed bg-white border-collapse">
                <thead id="main-table-head" class="bg-slate-100 text-[10px] text-slate-500"></thead>
                <tbody id="main-table-body"></tbody>
            </table>
        </div>

        <div id="summary-view" class="p-4 border-t bg-slate-50">
            <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-7 gap-2"></div>
        </div>
    </div>

    <!-- 印刷用レイアウト -->
    <div id="print-view" class="hidden bg-white print-area mx-auto max-w-[1000px]">
        <div class="flex justify-start mb-2">
            <table class="w-auto border-collapse" style="width: 260px; border: 1.5px solid black;">
                <tr class="text-[10px] text-center font-bold">
                    <td class="border border-black w-14 h-6">校長</td><td class="border border-black w-14">教頭</td><td class="border border-black w-14">教務</td><td class="border border-black w-14">担任</td>
                </tr>
                <tr><td class="border border-black h-14"></td><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td></tr>
            </table>
        </div>
        <div class="text-center mb-6"><h2 class="text-3xl font-bold tracking-[1.2em]">5月学習指導計画表</h2></div>
        <table class="w-full border-collapse border-2 border-black text-[10px]">
            <thead>
                <tr class="bg-gray-100 text-center font-bold">
                    <th class="border border-black w-12 p-2">日(曜)</th><th class="border border-black w-40 p-2">行事・朝の活動</th>
                    <th class="border border-black">1</th><th class="border border-black">2</th><th class="border border-black">3</th>
                    <th class="border border-black">4</th><th class="border border-black">5</th><th class="border border-black">6</th>
                    <th class="border border-black w-32 p-2">備考</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
        <div class="mt-8 no-print text-center"><button onclick="window.print()" class="bg-blue-600 text-white px-10 py-3 rounded-full font-bold">印刷・PDF保存</button><button onclick="setView('edit')" class="ml-4 text-slate-400 underline text-sm">戻る</button></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMonday = new Date('2026-05-11'); 
        let subjects = [], units = [], currentMode = 'edit';

        async function init() {
            try {
                const [{ data: s }, { data: u }, { data: p }] = await Promise.all([
                    _supabase.from('subjects').select('*').order('display_order'),
                    _supabase.from('units').select('*'),
                    _supabase.from('yearly_plans').select('*').eq('month', 5)
                ]);
                subjects = s || []; units = u || []; window.plans = p || [];
                render();
            } catch (err) { document.getElementById('save-status').innerText = "エラー: " + err.message; }
        }

        function setView(mode) {
            currentMode = mode;
            render();
        }

        async function render() {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = "Syncing...";
            
            // UIの切り替え
            const isPrint = (currentMode === 'print');
            document.getElementById('ui-container').classList.toggle('hidden', isPrint);
            document.getElementById('print-view').classList.toggle('hidden', !isPrint);
            document.getElementById('week-controls').classList.toggle('hidden', currentMode !== 'edit');
            document.getElementById('summary-view').classList.toggle('hidden', currentMode !== 'edit');
            document.getElementById('view-title').innerText = currentMode === 'edit' ? "🗓️ 週案入力" : currentMode === 'monthly' ? "📋 行事入力" : currentMode === 'base' ? "⚙️ 固定時間割" : "📄 印刷表示";

            if (isPrint) return renderPrintView();

            const { data: sch } = await _supabase.from('schedules').select('*');
            const { data: base } = await _supabase.from('base_schedules').select('*');
            const { data: notes } = await _supabase.from('daily_notes').select('*');

            const head = document.getElementById('main-table-head');
            const body = document.getElementById('main-table-body');
            head.innerHTML = ""; body.innerHTML = "";

            if (currentMode === 'edit') {
                const weekDays = [];
                for(let i=0; i<5; i++) {
                    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                    weekDays.push(d.toISOString().split('T')[0]);
                }
                head.innerHTML = `<tr><th class="border p-2 w-12">校時</th>${weekDays.map((d,i)=>`<th class="border p-1 text-center font-bold">${d.split('-')[2]}日(${['月','火','水','木','金'][i]})</th>`).join('')}</tr>`;

                for(let p=1; p<=6; p++){
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border bg-slate-50 text-center font-bold text-xs">${p}</td>`;
                    weekDays.forEach(date => {
                        const cell = sch?.find(s => s.date === date && s.period === p);
                        const td = document.createElement('td');
                        td.className = "border p-1 h-32 align-top hover:bg-indigo-50 transition";
                        const subOpt = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                        const filteredUnits = units.filter(u => u.subject_id === cell?.subject_id);
                        const unitOpt = filteredUnits.map(u => `<option value="${u.id}" ${cell?.unit_id === u.id ? 'selected' : ''}>${u.unit_name}</option>`).join('');
                        td.innerHTML = `<select onchange="saveData('${date}', ${p}, this.value)" class="w-full text-xs font-bold text-indigo-800 bg-transparent outline-none mb-1"><option value="">--</option>${subOpt}</select>
                            <select onchange="saveUnit('${date}', ${p}, this.value)" class="w-full text-[9px] bg-indigo-50 text-indigo-600 rounded mb-1 outline-none ${!cell?.subject_id ? 'hidden' : ''}"><option value="">--</option>${unitOpt}</select>
                            <textarea onblur="updateMemo('${date}', ${p}, this.value)" class="w-full text-[9px] leading-tight h-16 bg-transparent border-none resize-none outline-none focus:bg-white p-1" placeholder="備考...">${cell?.memo || ''}</textarea>`;
                        tr.appendChild(td);
                    });
                    body.appendChild(tr);
                }
                document.getElementById('current-week-label').innerText = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日週`;
                renderSummary(sch);

            } else if (currentMode === 'monthly') {
                head.innerHTML = '<tr><th class="border p-2 w-20">日付</th><th class="border p-2 text-blue-600">行事・朝の活動</th><th class="border p-2 w-48 text-blue-600">備考</th></tr>';
                for(let i=1; i<=31; i++){
                    const ds = `2026-05-${String(i).padStart(2,'0')}`;
                    const n = notes?.find(x => x.date === ds);
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border p-2 text-center bg-slate-50 font-bold text-xs">${i}日</td>
                        <td class="border p-0"><input class="input-flat p-2" value="${n?.event || ''}" onblur="saveNote('${ds}','event',this.value)"></td>
                        <td class="border p-0"><input class="input-flat p-2" value="${n?.remark || ''}" onblur="saveNote('${ds}','remark',this.value)"></td>`;
                    body.appendChild(tr);
                }
            } else if (currentMode === 'base') {
                head.innerHTML = '<tr><th class="border p-2 w-12 text-orange-600">校時</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th></tr>';
                for(let p=1; p<=6; p++){
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="border p-2 font-bold text-center bg-orange-50 text-orange-300 text-xs">${p}</td>`;
                    for(let dw=1; dw<=5; dw++){
                        const cell = base?.find(x => x.day_of_week === dw && x.period === p);
                        const subOpt = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                        tr.innerHTML += `<td class="border p-1 bg-orange-50/30"><select onchange="saveBase(${dw}, ${p}, this.value)" class="w-full text-xs font-bold outline-none bg-transparent"><option value="">--</option>${subOpt}</select></td>`;
                    }
                    body.appendChild(tr);
                }
            }
            statusEl.innerText = "Cloud Connected";
        }

        async function renderPrintView() {
            const { data: sch } = await _supabase.from('schedules').select('*, subjects(name), units(unit_name)');
            const { data: notes } = await _supabase.from('daily_notes').select('*');
            const pBody = document.getElementById('print-table-body');
            pBody.innerHTML = "";
            const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
            for (let i = 1; i <= 31; i++) {
                const ds = `2026-05-${String(i).padStart(2, '0')}`;
                const d = new Date(ds);
                const n = notes?.find(x => x.date === ds);
                let cells = '';
                for (let p=1; p<=6; p++) {
                    const c = sch?.find(s => s.date === ds && s.period === p);
                    cells += `<td class="border border-black p-1 align-top h-14 leading-tight text-center"><div class="font-bold underline mb-1">${c?.subjects?.name || ''}</div><div class="text-[8px] text-slate-700">${c?.units?.unit_name || ''}</div></td>`;
                }
                pBody.innerHTML += `<tr class="${d.getDay()===0||d.getDay()===6?'bg-gray-50':''}">
                    <td class="border border-black text-center font-bold p-1">${i}<br><span class="text-[8px]">(${dayNames[d.getDay()]})</span></td>
                    <td class="border border-black p-1 align-top text-[8px]">${n?.event || ''}</td>${cells}<td class="border border-black p-1 align-top italic text-[8px]">${n?.remark || ''}</td></tr>`;
            }
        }

        async function saveData(d, p, sid) { await _supabase.from('schedules').upsert({ date: d, period: p, subject_id: sid?parseInt(sid):null, unit_id: null }, { onConflict: 'date,period' }); render(); }
        async function saveUnit(d, p, uid) { await _supabase.from('schedules').upsert({ date: d, period: p, unit_id: uid?parseInt(uid):null }, { onConflict: 'date,period' }); }
        async function updateMemo(d, p, m) { await _supabase.from('schedules').upsert({ date: d, period: p, memo: m }, { onConflict: 'date,period' }); }
        async function saveNote(d, col, val) { await _supabase.from('daily_notes').upsert({ date: d, [col]: val }, { onConflict: 'date' }); }
        async function saveBase(dw, p, sid) { await _supabase.from('base_schedules').upsert({ day_of_week: dw, period: p, subject_id: sid?parseInt(sid):null }, { onConflict: 'day_of_week,period' }); }
        
        async function applyBaseSchedule() {
            if(!confirm("設定した『固定時間割』をこの週に適用しますか？")) return;
            const { data: base } = await _supabase.from('base_schedules').select('*');
            const upserts = [];
            for(let i=0; i<5; i++){
                const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                const ds = d.toISOString().split('T')[0];
                base.filter(b => b.day_of_week === (i+1)).forEach(b => upserts.push({ date: ds, period: b.period, subject_id: b.subject_id, unit_id: null }));
            }
            await _supabase.from('schedules').upsert(upserts, { onConflict: 'date,period' }); render();
        }

        function changeWeek(n) { currentMonday.setDate(currentMonday.getDate() + n); render(); }
        function renderSummary(sch) {
            const g = document.getElementById('summary-grid'); g.innerHTML = '';
            subjects.forEach(s => {
                const act = sch?.filter(x => x.subject_id === s.id).length || 0;
                const p = window.plans?.find(x => x.subject_id === s.id)?.planned_hours || 0;
                g.innerHTML += `<div class="bg-white border p-1 rounded text-[9px] flex justify-between px-2"><b>${s.name}</b> <span>${act}/${p}</span></div>`;
            });
        }
        init();
    </script>
</body>
</html>
