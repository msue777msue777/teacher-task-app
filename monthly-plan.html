<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週案・月案・時数管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; padding: 0; margin: 0; }
            .print-area { width: 100%; padding: 10mm; }
            th, td { border: 1px solid black !important; }
        }
        .input-flat { width: 100%; border: none; background: transparent; font-size: 0.75rem; padding: 2px; }
        .input-flat:focus { background: white; outline: 1px solid #3b82f6; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; }
    </style>
</head>
<body class="bg-slate-100 p-2 md:p-4 text-slate-800 font-sans">

    <!-- 操作パネル（印刷時は非表示） -->
    <div id="ui-panel" class="max-w-[1200px] mx-auto bg-white shadow-lg rounded-lg overflow-hidden no-print mb-8">
        <div class="bg-slate-800 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <div>
                <h1 id="view-title" class="text-xl font-bold">🗓️ 5月 週案入力</h1>
                <p id="save-status" class="text-[10px] opacity-60">準備完了</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <button onclick="changeMode('edit')" class="bg-indigo-600 px-3 py-1 rounded text-sm">週案入力</button>
                <button onclick="changeMode('monthly')" class="bg-blue-600 px-3 py-1 rounded text-sm">月案行事入力</button>
                <button onclick="changeMode('base')" class="bg-orange-600 px-3 py-1 rounded text-sm">固定時間割</button>
                <button onclick="changeMode('print')" class="bg-emerald-600 px-3 py-1 rounded text-sm font-bold">月案印刷</button>
            </div>
        </div>

        <!-- 週切り替え（週案モードの時だけ表示） -->
        <div id="week-nav" class="p-3 border-b flex justify-between items-center bg-slate-50">
            <button onclick="moveWeek(-7)" class="text-indigo-600 font-bold px-4 py-1 border border-indigo-200 rounded hover:bg-indigo-50">◀ 前の週</button>
            <span id="current-week-label" class="text-lg font-black tracking-tight text-slate-700">---</span>
            <button onclick="moveWeek(7)" class="text-indigo-600 font-bold px-4 py-1 border border-indigo-200 rounded hover:bg-indigo-50">次の週 ▶</button>
            <button onclick="applyBaseSchedule()" class="ml-4 text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-bold hover:bg-indigo-200">固定時間割を適用</button>
        </div>

        <!-- メインタブコンテンツ -->
        <div class="p-2 md:p-4 overflow-x-auto">
            <table id="main-table" class="bg-white table-fixed">
                <thead id="main-table-head"></thead>
                <tbody id="main-table-body"></tbody>
            </table>
        </div>

        <!-- 時数集計 -->
        <div id="summary-area" class="p-4 border-t bg-slate-50">
            <div id="summary-grid" class="grid grid-cols-2 md:grid-cols-7 gap-2"></div>
        </div>
    </div>

    <!-- 印刷用 月案レイアウト（通常は非表示、印刷時のみ活躍） -->
    <div id="print-view" class="hidden bg-white print-area mx-auto">
        <div class="flex justify-start mb-2">
            <table class="w-auto" style="width: 240px; border-collapse: collapse;">
                <tr>
                    <td class="border border-black text-[9px] text-center w-12 h-5">校長</td>
                    <td class="border border-black text-[9px] text-center w-12">教頭</td>
                    <td class="border border-black text-[9px] text-center w-12">教務</td>
                    <td class="border border-black text-[9px] text-center w-12">担任</td>
                </tr>
                <tr><td class="border border-black h-12"></td><td class="border border-black"></td><td class="border border-black"></td><td class="border border-black"></td></tr>
            </table>
        </div>
        <div class="text-center mb-6">
            <h2 class="text-3xl font-bold tracking-[1.5em] ml-[1.5em]">5月学習指導計画表</h2>
        </div>
        <table class="w-full border-collapse border-2 border-black text-[9px]">
            <thead>
                <tr class="bg-gray-50 text-center">
                    <th class="border border-black w-10 p-1">日(曜)</th>
                    <th class="border border-black w-32 p-1">行事・朝の活動</th>
                    <th class="border border-black w-24">1</th>
                    <th class="border border-black w-24">2</th>
                    <th class="border border-black w-24">3</th>
                    <th class="border border-black w-24">4</th>
                    <th class="border border-black w-24">5</th>
                    <th class="border border-black w-24">6</th>
                    <th class="border border-black w-32 p-1">備考</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
        <div class="mt-8 no-print text-center">
            <button onclick="window.print()" class="bg-blue-600 text-white px-12 py-3 rounded-full shadow-lg font-bold">印刷・PDF保存を実行</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentMonday = new Date('2026-05-11'); 
        let subjects = [], units = [], currentMode = 'edit';

        async function init() {
            try {
                const [{ data: s }, { data: u }, { data: p }] = await Promise.all([
                    _supabase.from('subjects').select('*').order('display_order'),
                    _supabase.from('units').select('*'),
                    _supabase.from('yearly_plans').select('*').eq('month', 5)
                ]);
                subjects = s || []; units = u || []; window.plans = p || [];
                render();
            } catch (err) { alert("初期化エラー: " + err.message); }
        }

        function changeMode(mode) {
            currentMode = mode;
            render();
        }

        function moveWeek(days) {
            currentMonday.setDate(currentMonday.getDate() + days);
            render();
        }

        async function render() {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = "同期中...";
            
            const { data: sch } = await _supabase.from('schedules').select('*');
            const { data: notes } = await _supabase.from('daily_notes').select('*');
            const { data: base } = await _supabase.from('base_schedules').select('*');

            const head = document.getElementById('main-table-head');
            const body = document.getElementById('main-table-body');
            const printBody = document.getElementById('print-table-body');
            const nav = document.getElementById('week-nav');
            const summary = document.getElementById('summary-area');
            const printView = document.getElementById('print-view');
            const uiPanel = document.getElementById('ui-panel');

            // 表示のリセット
            head.innerHTML = ''; body.innerHTML = ''; printBody.innerHTML = '';
            printView.classList.add('hidden');
            uiPanel.classList.remove('hidden');
            nav.classList.add('hidden');
            summary.classList.add('hidden');

            if (currentMode === 'edit') {
                nav.classList.remove('hidden');
                summary.classList.remove('hidden');
                document.getElementById('view-title').innerText = "🗓️ 週案入力モード";
                
                const weekDays = [];
                for(let i=0; i<5; i++){
                    const d = new Date(currentMonday); d.setDate(d.getDate() + i);
                    weekDays.push(d.toISOString().split('T')[0]);
                }
                
                let hRow = '<th class="p-2 w-12 text-[10px]">校時</th>';
                weekDays.forEach((d, i) => hRow += `<th class="p-2 text-center text-xs font-bold">${d.split('-')[2]}日(${['月','火','水','木','金'][i]})</th>`);
                head.innerHTML = hRow;

                for(let p=1; p<=6; p++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="bg-slate-50 text-center font-bold text-slate-400 text-xs">${p}</td>`;
                    weekDays.forEach(date => {
                        const cell = sch?.find(s => s.date === date && s.period === p);
                        const td = document.createElement('td');
                        td.className = "p-1 h-28 align-top border";
                        
                        const subOptions = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                        const filteredUnits = units.filter(u => u.subject_id === cell?.subject_id);
                        const unitOptions = filteredUnits.map(u => `<option value="${u.id}" ${cell?.unit_id === u.id ? 'selected' : ''}>${u.unit_name}</option>`).join('');

                        td.innerHTML = `
                            <select onchange="saveData('${date}', ${p}, this.value)" class="w-full text-xs font-bold text-indigo-700 outline-none bg-transparent appearance-none mb-1"><option value="">-教科-</option>${subOptions}</select>
                            <select onchange="saveUnit('${date}', ${p}, this.value)" class="w-full text-[9px] bg-slate-50 text-slate-600 rounded mb-1 outline-none ${!cell?.subject_id?'hidden':''}"><option value="">-単元-</option>${unitOptions}</select>
                            <textarea onblur="saveMemo('${date}', ${p}, this.value)" class="w-full text-[9px] h-12 bg-transparent border-none resize-none outline-none font-sans" placeholder="備考...">${cell?.memo || ''}</textarea>
                        `;
                        tr.appendChild(td);
                    });
                    body.appendChild(tr);
                }
                document.getElementById('current-week-label').innerText = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日〜`;
                renderSummary(sch);

            } else if (currentMode === 'monthly') {
                document.getElementById('view-title').innerText = "📋 月案行事入力モード";
                head.innerHTML = '<tr><th class="p-2 w-20">日付</th><th class="p-2">行事・朝の活動</th><th class="p-2">備考</th></tr>';
                for(let i=1; i<=31; i++) {
                    const ds = `2026-05-${String(i).padStart(2,'0')}`;
                    const n = notes?.find(x => x.date === ds);
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-2 text-center bg-slate-50 text-xs font-bold">${i}日</td>
                        <td class="border p-0"><input type="text" class="input-flat p-2" value="${n?.event || ''}" onblur="saveNote('${ds}', 'event', this.value)" placeholder="行事..."></td>
                        <td class="border p-0"><input type="text" class="input-flat p-2" value="${n?.remark || ''}" onblur="saveNote('${ds}', 'remark', this.value)" placeholder="備考..."></td>`;
                    body.appendChild(tr);
                }

            } else if (currentMode === 'base') {
                document.getElementById('view-title').innerText = "⚙️ 固定時間割設定";
                head.innerHTML = '<tr><th class="p-2 w-12">校時</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th></tr>';
                for(let p=1; p<=6; p++){
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-2 bg-orange-50 font-bold text-center">${p}</td>`;
                    for(let dw=1; dw<=5; dw++){
                        const cell = base?.find(x => x.day_of_week === dw && x.period === p);
                        const subOpt = subjects.map(s => `<option value="${s.id}" ${cell?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                        tr.innerHTML += `<td class="border p-1 h-12 bg-orange-50/30"><select onchange="saveBase(${dw}, ${p}, this.value)" class="w-full text-xs font-bold outline-none bg-transparent"><option value="">-</option>${subOpt}</select></td>`;
                    }
                    body.appendChild(tr);
                }

            } else if (currentMode === 'print') {
                uiPanel.classList.add('hidden');
                printView.classList.remove('hidden');
                const dayNames = ["日", "月", "火", "水", "木", "金", "土"];
                for (let i = 1; i <= 31; i++) {
                    const ds = `2026-05-${String(i).padStart(2,'0')}`;
                    const d = new Date(ds);
                    const n = notes?.find(x => x.date === ds);
                    let cells = '';
                    for (let p=1; p<=6; p++) {
                        const c = sch?.find(x => x.date === ds && x.period === p);
                        const sName = subjects.find(s => s.id === c?.subject_id)?.name || '';
                        const uName = units.find(u => u.id === c?.unit_id)?.unit_name || '';
                        cells += `<td class="border border-black p-1 align-top h-12 leading-tight">
                            <div class="font-bold border-b border-dotted border-gray-300 mb-0.5">${sName}</div>
                            <div class="text-[7.5px]">${uName}</div>
                        </td>`;
                    }
                    printBody.innerHTML += `<tr class="${d.getDay()===0||d.getDay()===6?'bg-gray-100':''}">
                        <td class="border border-black text-center font-bold">${i}<br><span class="text-[7px]">(${dayNames[d.getDay()]})</span></td>
                        <td class="border border-black p-1 text-[8px] align-top">${n?.event || ''}</td>
                        ${cells}
                        <td class="border border-black p-1 text-[8px] align-top">${n?.remark || ''}</td>
                    </tr>`;
                }
            }
            statusEl.innerText = "クラウド同期済み";
        }

        // 保存用関数群
        async function saveData(d, p, sid) { await _supabase.from('schedules').upsert({ date: d, period: p, subject_id: sid?parseInt(sid):null, unit_id: null }, { onConflict: 'date,period' }); render(); }
        async function saveUnit(d, p, uid) { await _supabase.from('schedules').upsert({ date: d, period: p, unit_id: uid?parseInt(uid):null }, { onConflict: 'date,p
