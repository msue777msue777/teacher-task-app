<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月案・週案メーカー Pro - Phase 6</title>

<style>
/* --- 共通スタイル --- */
body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #f5f7fa; margin: 0; color: #333; }
header { background: #2563eb; color: white; text-align: center; padding: 15px; }
.container { max-width: 1300px; margin: auto; padding: 20px; }
.card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
h2 { margin-top: 0; font-size: 1.2rem; border-left: 5px solid #2563eb; padding-left: 10px; margin-bottom: 15px; }
.grid-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
input, select, textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
button { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: bold; }
button:hover { background: #1d4ed8; }
.btn-print { background: #059669; }
.btn-weekly { background: #8b5cf6; } /* 紫色の週案ボタン */

table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px; }
th, td { border: 1px solid #000; padding: 6px; text-align: center; }
th { background: #f0f4ff; }
.input-cell { width: 95%; border: none; text-align: center; background: transparent; }

/* --- 印刷制御 --- */
@media screen {
    .print-only { display: none; }
}

@media print {
    header, .no-print, button, .back, .card:not(.print-target) { display: none !important; }
    body { background: white; }
    .container { width: 100%; max-width: none; padding: 0; }
    .card.print-target { box-shadow: none; padding: 0; border: none; display: block !important; }
    
    /* 週案印刷時は横向きを推奨（ブラウザ設定による） */
    @page { size: A4 landscape; margin: 10mm; }
    .weekly-print-table { font-size: 9pt; }
}

/* 週末の色 */
.sat { background: #e0f2fe !important; }
.sun { background: #fee2e2 !important; }
</style>
</head>

<body>

<header>
    <h1>月案・週案メーカー Pro</h1>
</header>

<div class="container">
    <a href="#" class="back no-print">← トップへ戻る</a>

    <!-- ① 基本設定 -->
    <div class="card no-print">
        <h2>① 基本設定</h2>
        <div class="grid-config">
            <div>学年: <select id="grade"><option>4年</option><option selected>5年</option><option>6年</option></select></div>
            <div>担任: <input id="teacher" value="山田 太郎"></div>
            <div>年月: <input id="year" type="number" value="2026" style="width:70px;">年 <input id="month" type="number" value="6" style="width:50px;">月</div>
            <button onclick="updateAll()">表示を更新</button>
        </div>
    </div>

    <!-- ⑥ 週案表示エリア（新設） -->
    <div class="card no-print">
        <h2>⑥ 週案作成（教務提出用）</h2>
        <div style="margin-bottom:15px;">
            表示する週：
            <select id="weekSelector" onchange="renderWeeklyPlan()">
                <option value="1">第1週</option>
                <option value="2">第2週</option>
                <option value="3">第3週</option>
                <option value="4">第4週</option>
                <option value="5">第5週</option>
            </select>
            <button class="btn-weekly" onclick="printWeekly()">週案を印刷 (A4横)</button>
        </div>
        <div id="weeklyPlanPreview"></div>
    </div>

    <!-- ② 固定時間割 -->
    <div class="card no-print">
        <h2>② 曜日別設定（固定時間割）</h2>
        <table id="timetableEditor"></table>
        <button onclick="saveWeeklyConfig()">曜日設定を保存</button>
    </div>

    <!-- ③ & ⑤ 時数・単元管理 -->
    <div class="card no-print">
        <h2>③・⑤ 進捗管理</h2>
        <div id="hoursManagementArea"></div>
    </div>

    <!-- 児童用予定表の印刷 -->
    <button class="btn-print no-print" onclick="window.print()">学習予定表(児童用)を印刷</button>

    <!-- 印刷用：学習予定表（月案） -->
    <div class="card print-target" id="monthlyPrintSection">
        <h2 id="tableTitle">学習予定表</h2>
        <div style="display:flex; justify-content: space-between; margin-bottom: 5px;">
            <div id="displayTarget"></div>
            <div id="displayTeacher"></div>
        </div>
        <div id="tableArea"></div>
        <div id="unitSummaryArea" style="font-size:11px; margin-top:10px; border:1px solid #000; padding:5px;"></div>
        <textarea id="belongingsArea" style="width:100%; min-height:60px; margin-top:10px; border:1px solid #000;" onchange="saveMonthlyData()"></textarea>
    </div>

    <!-- 印刷用：週案（隠し要素） -->
    <div id="weeklyPrintSection" class="card print-target print-only">
        <h2 id="weeklyPrintTitle">週指導計画（週案）</h2>
        <div id="weeklyPrintTableArea"></div>
    </div>

</div>

<script>
// --- 基本データ ---
const subjects = ["国語","算数","理科","社会","体育","音楽","図工","家庭","外国語","総合","学活","道徳"];
const weekNames = ["日","月","火","水","木","金","土"];

let weeklyConfig = JSON.parse(localStorage.getItem("weeklyConfig")) || {
    "月": { lessons: ["国語","算数","理科","社会","体育",""], dismissal: "15:20" },
    "火": { lessons: ["算数","国語","音楽","体育","総合",""], dismissal: "15:20" },
    "水": { lessons: ["国語","算数","理科","社会","",""], dismissal: "14:30" },
    "木": { lessons: ["算数","国語","図工","社会","総合",""], dismissal: "15:20" },
    "金": { lessons: ["国語","算数","理科","学活","体育",""], dismissal: "15:20" },
    "土": { lessons: ["","","","","",""], dismissal: "" },
    "日": { lessons: ["","","","","",""], dismissal: "" }
};
let monthlyData = JSON.parse(localStorage.getItem("monthlyData")) || {};
let unitMaster = JSON.parse(localStorage.getItem("unitMaster")) || {};

function init(){
    renderWeeklyEditor();
    createTable();
    renderWeeklyPlan();
}

// 固定時間割エディタ
function renderWeeklyEditor(){
    let html = `<tr><th>曜日</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>下校</th></tr>`;
    ["月","火","水","木","金","土"].forEach(day => {
        html += `<tr><td>${day}</td>`;
        for(let i=0; i<6; i++){
            html += `<td><select id="t-${day}-${i}" style="width:60px;"><option value=""></option>`;
            subjects.forEach(s => html += `<option value="${s}" ${weeklyConfig[day].lessons[i]===s?"selected":""}>${s}</option>`);
            html += `</select></td>`;
        }
        html += `<td><input id="d-${day}" value="${weeklyConfig[day].dismissal}" style="width:50px;"></td></tr>`;
    });
    document.getElementById("timetableEditor").innerHTML = html;
}

function saveWeeklyConfig(){
    ["月","火","水","木","金","土"].forEach(day => {
        for(let i=0; i<6; i++) weeklyConfig[day].lessons[i] = document.getElementById(`t-${day}-${i}`).value;
        weeklyConfig[day].dismissal = document.getElementById(`d-${day}`).value;
    });
    localStorage.setItem("weeklyConfig", JSON.stringify(weeklyConfig));
    updateAll();
}

// 月案・予定表の生成
function createTable(){
    const year = Number(document.getElementById("year").value);
    const month = Number(document.getElementById("month").value);
    const monthKey = `${year}-${month}`;
    const lastDay = new Date(year, month, 0).getDate();
    const currentMonthData = monthlyData[monthKey] || { events: {}, belongings: "", selectedUnits: {} };

    document.getElementById("tableTitle").innerText = `${year}年度 ${month}月 学習予定表`;
    document.getElementById("displayTarget").innerText = `${document.getElementById("grade").value}年生`;
    document.getElementById("displayTeacher").innerText = `担任：${document.getElementById("teacher").value}`;
    document.getElementById("belongingsArea").value = currentMonthData.belongings || "";

    let tableHtml = `<table><tr><th>日</th><th>曜</th><th>行事など</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>下校</th></tr>`;
    const actualCount = {};

    for(let d=1; d<=lastDay; d++){
        const date = new Date(year, month-1, d);
        const week = weekNames[date.getDay()];
        const config = weeklyConfig[week];
        tableHtml += `<tr><td>${d}</td><td class="${week==='日'?'sun':(week==='土'?'sat':'')}">${week}</td>
            <td><input class="input-cell" id="ev-${d}" value="${currentMonthData.events[d]||''}" onchange="saveMonthlyData()"></td>`;
        for(let i=0; i<6; i++){
            const s = config.lessons[i];
            tableHtml += `<td style="width:55px;">${s}</td>`;
            if(s) actualCount[s] = (actualCount[s]||0) + 1;
        }
        tableHtml += `<td>${config.dismissal}</td></tr>`;
    }
    document.getElementById("tableArea").innerHTML = tableHtml + "</table>";
    renderHoursAndUnits(actualCount, currentMonthData);
    renderWeeklyPlan(); // 月案が変われば週案も更新
}

// 週案の生成
function renderWeeklyPlan(){
    const year = Number(document.getElementById("year").value);
    const month = Number(document.getElementById("month").value);
    const weekNum = Number(document.getElementById("weekSelector").value);
    const monthKey = `${year}-${month}`;
    const currentMonthData = monthlyData[monthKey] || { events: {}, selectedUnits: {} };

    // その月の「第n週」の日付リストを取得
    const daysInWeek = [];
    const firstDayOfMonth = new Date(year, month-1, 1).getDay(); // 初日の曜日
    let startDay = 1 + (weekNum - 1) * 7 - firstDayOfMonth + 1;
    // 月曜始まりに調整したい場合はここを調整するが、簡易的に7日分取得
    for(let i=0; i<7; i++){
        let d = startDay + i;
        if(d > 0 && d <= new Date(year, month, 0).getDate()){
            daysInWeek.push(d);
        }
    }

    if(daysInWeek.length === 0) {
        document.getElementById("weeklyPlanPreview").innerHTML = "該当する日付がありません。";
        return;
    }

    let head = `<tr><th>校時</th>`;
    daysInWeek.forEach(d => {
        const w = weekNames[new Date(year, month-1, d).getDay()];
        head += `<th class="${w==='日'?'sun':(w==='土'?'sat':'')}">${month}/${d}(${w})</th>`;
    });
    head += `</tr>`;

    let body = "";
    // 行事行
    body += `<tr><td>行事</td>`;
    daysInWeek.forEach(d => body += `<td>${currentMonthData.events[d] || ""}</td>`);
    body += `</tr>`;

    // 1〜6校時
    for(let i=0; i<6; i++){
        body += `<tr><td>${i+1}</td>`;
        daysInWeek.forEach(d => {
            const w = weekNames[new Date(year, month-1, d).getDay()];
            const subj = weeklyConfig[w].lessons[i];
            const unit = (currentMonthData.selectedUnits && currentMonthData.selectedUnits[subj]) || "";
            body += `<td><div style="font-weight:bold;">${subj}</div><div style="font-size:10px; color:#666;">${unit}</div></td>`;
        });
        body += `</tr>`;
    }

    const tableHtml = `<table class="weekly-print-table">${head}${body}</table>`;
    document.getElementById("weeklyPlanPreview").innerHTML = tableHtml;
    document.getElementById("weeklyPrintTableArea").innerHTML = tableHtml;
    document.getElementById("weeklyPrintTitle").innerText = `${year}年度 ${month}月 第${weekNum}週 週指導計画（${document.getElementById("grade").value} / ${document.getElementById("teacher").value}）`;
}

// 印刷用：週案
function printWeekly(){
    // 印刷時に月案セクションを隠し、週案セクションを表示する
    document.getElementById("monthlyPrintSection").classList.add("print-only");
    document.getElementById("weeklyPrintSection").classList.remove("print-only");
    window.print();
    // 印刷ダイアログを閉じたあとに戻す
    document.getElementById("monthlyPrintSection").classList.remove("print-only");
    document.getElementById("weeklyPrintSection").classList.add("print-only");
}

// (既存) 時数・単元管理の描画
function renderHoursAndUnits(actualCount, currentMonthData){
    let html = `<table><tr><th>教科</th><th>月実施</th><th>指導単元(今月)</th></tr>`;
    let unitSummaryHtml = "";
    subjects.forEach(s => {
        const act = actualCount[s] || 0;
        const selectedUnitName = currentMonthData.selectedUnits ? currentMonthData.selectedUnits[s] : "";
        let unitOptions = `<option value="">--未選択--</option>`;
        if(unitMaster[s]){
            unitMaster[s].forEach(u => {
                unitOptions += `<option value="${u.name}" ${u.name===selectedUnitName?'selected':''}>${u.name}</option>`;
            });
        }
        html += `<tr><td>${s}</td><td>${act}</td><td><select id="selUnit-${s}" onchange="saveMonthlyData()">${unitOptions}</select></td></tr>`;
        if(selectedUnitName) unitSummaryHtml += `<span>【${s}】${selectedUnitName} </span> `;
    });
    document.getElementById("hoursManagementArea").innerHTML = html + "</table>";
    document.getElementById("unitSummaryArea").innerHTML = unitSummaryHtml;
}

function saveMonthlyData(){
    const year = document.getElementById("year").value;
    const month = document.getElementById("month").value;
    const monthKey = `${year}-${month}`;
    const lastDay = new Date(year, month, 0).getDate();
    const events = {};
    for(let d=1; d<=lastDay; d++) {
        const val = document.getElementById(`ev-${d}`).value;
        if(val) events[d] = val;
    }
    const selectedUnits = {};
    subjects.forEach(s => { selectedUnits[s] = document.getElementById(`selUnit-${s}`).value; });
    monthlyData[monthKey] = { events, belongings: document.getElementById("belongingsArea").value, selectedUnits };
    localStorage.setItem("monthlyData", JSON.stringify(monthlyData));
    createTable();
}

function updateAll(){ createTable(); }

init();
</script>
</body>
</html>
