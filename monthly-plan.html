<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5月 週案・時数管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-2">

    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden">
        <!-- ヘッダー -->
        <div class="bg-emerald-700 p-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
            <div>
                <h1 class="text-xl font-bold">5月 週案・時数管理</h1>
                <p id="save-status" class="text-[10px] opacity-80">接続済み</p>
            </div>
            
            <!-- 週切り替えボタン -->
            <div class="flex items-center bg-emerald-800 rounded-lg p-1">
                <button onclick="changeWeek(-7)" class="px-3 py-1 hover:bg-emerald-600 rounded">◀ 前の週</button>
                <span id="current-week-label" class="px-4 text-sm font-bold border-x border-emerald-600">5月11日週</span>
                <button onclick="changeWeek(7)" class="px-3 py-1 hover:bg-emerald-600 rounded">次の週 ▶</button>
            </div>

            <a href="index.html" class="bg-emerald-600 px-4 py-2 rounded shadow-sm text-sm hover:bg-emerald-500 text-center w-full md:w-auto">戻る</a>
        </div>

        <!-- 週案テーブル -->
        <div class="overflow-x-auto p-2">
            <table class="w-full border-collapse border border-gray-300">
                <thead>
                    <tr id="table-header" class="bg-gray-100 text-[10px] md:text-xs text-gray-600">
                        <th class="border border-gray-300 p-2 w-12">校時</th>
                        <!-- JSで日付が入ります -->
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    <!-- JSで動的に生成 -->
                </tbody>
            </table>
        </div>

        <!-- 時数集計 -->
        <div class="bg-slate-100 p-4 md:p-6 border-t border-slate-200">
            <h2 class="text-sm font-bold mb-4 text-slate-600 flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                5月の実施時数状況（月間累計）
            </h2>
            <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-3">
                <!-- JSで動的に生成 -->
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 表示の基準となる月曜日
        let currentMonday = new Date('2026-05-11'); 
        const periods = [1, 2, 3, 4, 5, 6];
        let subjects = [];

        async function init() {
            try {
                const [{ data: subData }, { data: plans }] = await Promise.all([
                    _supabase.from('subjects').select('*').order('display_order'),
                    _supabase.from('yearly_plans').select('*').eq('month', 5)
                ]);
                subjects = subData || [];
                window.plans = plans || []; // 計画をグローバルに保存
                await refreshData();
            } catch (e) {
                document.getElementById('save-status').innerText = '接続エラー';
            }
        }

        // 週を切り替える関数
        async function changeWeek(daysOffset) {
            currentMonday.setDate(currentMonday.getDate() + daysOffset);
            await refreshData();
        }

        // データを再読み込みして画面を更新
        async function refreshData() {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = '読み込み中...';
            
            const { data: schData } = await _supabase.from('schedules').select('*');
            
            const weekDays = [];
            for(let i=0; i<5; i++) {
                const d = new Date(currentMonday);
                d.setDate(d.getDate() + i);
                weekDays.push(d.toISOString().split('T')[0]);
            }

            renderTableHeader(weekDays);
            renderTable(weekDays, schData || []);
            renderSummary(schData || [], window.plans);
            
            const label = `${currentMonday.getMonth()+1}月${currentMonday.getDate()}日週`;
            document.getElementById('current-week-label').innerText = label;
            statusEl.innerText = '接続済み';
        }

        function renderTableHeader(weekDays) {
            const header = document.getElementById('table-header');
            const dayNames = ["月", "火", "水", "木", "金"];
            header.innerHTML = '<th class="border border-gray-300 p-2 w-12">校時</th>';
            weekDays.forEach((date, i) => {
                header.innerHTML += `<th class="border border-gray-300 p-2">${date.split('-')[2]}日(${dayNames[i]})</th>`;
            });
        }

        function renderTable(weekDays, savedData) {
            const body = document.getElementById('schedule-body');
            body.innerHTML = '';

            periods.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="border border-gray-300 p-2 bg-gray-50 text-center font-bold text-gray-400 text-xs">${p}</td>`;
                
                weekDays.forEach(dateStr => {
                    const cellData = savedData.find(d => d.date === dateStr && d.period === p);
                    const td = document.createElement('td');
                    td.className = "border border-gray-300 p-1 h-28 align-top hover:bg-emerald-50 transition-colors";
                    
                    const options = subjects.map(s => `<option value="${s.id}" ${cellData?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                    
                    td.innerHTML = `
                        <select onchange="save('${dateStr}', ${p}, this.value)" class="w-full text-[10px] md:text-xs font-bold bg-transparent mb-1 outline-none appearance-none cursor-pointer text-emerald-800">
                            <option value="">-- 教科 --</option>
                            ${options}
                        </select>
                        <textarea onblur="updateMemo('${dateStr}', ${p}, this.value)" class="w-full text-[10px] leading-tight h-16 bg-transparent border-none resize-none outline-none focus:bg-white p-1 rounded font-sans" placeholder="内容...">${cellData?.memo || ''}</textarea>
                    `;
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        async function save(date, period, subjectId) {
            document.getElementById('save-status').innerText = '保存中...';
            await _supabase.from('schedules').upsert({
                date: date,
                period: period,
                subject_id: subjectId ? parseInt(subjectId) : null
            }, { onConflict: 'date,period' });
            await refreshData();
        }

        async function updateMemo(date, period, memo) {
            await _supabase.from('schedules').upsert({
                date: date,
                period: period,
                memo: memo
            }, { onConflict: 'date,period' });
        }

        function renderSummary(schData, plans) {
            const container = document.getElementById('summary-grid');
            container.innerHTML = '';
            subjects.forEach(s => {
                const actual = schData.filter(d => d.subject_id === s.id).length;
                const plan = plans.find(p => p.subject_id === s.id)?.planned_hours || 0;
                const percent = Math.min((actual / (plan || 1)) * 100, 100);
                
                const card = document.createElement('div');
                card.className = "bg-white border border-slate-200 p-2 rounded shadow-sm";
                card.innerHTML = `
                    <div class="text-[10px] text-slate-400 font-bold mb-1">${s.name}</div>
                    <div class="text-sm font-black text-slate-700">${actual} <span class="text-[10px] font-normal text-slate-400">/ ${plan}</span></div>
                    <div class="w-full bg-slate-100 h-1 mt-1 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full transition-all duration-500" style="width: ${percent}%"></div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        init();
    </script>
</body>
</html>
