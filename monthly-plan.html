<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週案・時数管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 p-2 md:p-4">

    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden">
        <!-- ヘッダー -->
        <div class="bg-emerald-600 p-4 flex justify-between items-center text-white">
            <div>
                <h1 class="text-xl font-bold">5月 週案・時数管理</h1>
                <p class="text-[10px] opacity-80">teacher-task-app / monthly-plan</p>
            </div>
            <div class="flex items-center gap-4">
                <span id="save-status" class="text-xs bg-emerald-700 px-2 py-1 rounded">準備中...</span>
                <a href="index.html" class="text-white hover:text-emerald-200 text-sm">戻る</a>
            </div>
        </div>

        <!-- 週案テーブル -->
        <div class="overflow-x-auto p-2 md:p-4">
            <table class="w-full border-collapse border border-gray-300 table-fixed">
                <thead>
                    <tr class="bg-gray-100 text-xs">
                        <th class="border border-gray-300 p-2 w-10">校時</th>
                        <th class="border border-gray-300 p-2">月曜日</th>
                        <th class="border border-gray-300 p-2">火曜日</th>
                        <th class="border border-gray-300 p-2">水曜日</th>
                        <th class="border border-gray-300 p-2">木曜日</th>
                        <th class="border border-gray-300 p-2">金曜日</th>
                    </tr>
                </thead>
                <tbody id="schedule-body">
                    <!-- JSで動的に生成 -->
                </tbody>
            </table>
        </div>

        <!-- 時数集計（進捗バー風） -->
        <div class="bg-slate-50 p-4 md:p-6 border-t">
            <h2 class="text-sm font-bold mb-4 text-slate-700 uppercase tracking-wider">Subject Progress (時数進捗)</h2>
            <div id="summary-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-7 gap-3">
                <!-- JSで動的に生成 -->
            </div>
        </div>
    </div>

    <script>
        // --- 提供されたSupabase情報 ---
        const SUPABASE_URL = 'https://klewsfgafeixuvghkkvi.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_pexunuSRbbG_3GgfTUovTA_i7iwAHG0';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 5月の特定の週（サンプル：2026年5月11日週）
        const days = ["2026-05-11", "2026-05-12", "2026-05-13", "2026-05-14", "2026-05-15"];
        const periods = [1, 2, 3, 4, 5, 6];
        let subjects = [];

        async function init() {
            try {
                const { data: subData } = await _supabase.from('subjects').select('*').order('display_order');
                subjects = subData || [];

                const { data: schData } = await _supabase.from('schedules').select('*');
                
                renderTable(schData || []);
                renderSummary(schData || []);
                document.getElementById('save-status').innerText = '接続済み';
            } catch (e) {
                console.error(e);
                document.getElementById('save-status').innerText = '接続エラー';
            }
        }

        function renderTable(savedData) {
            const body = document.getElementById('schedule-body');
            body.innerHTML = '';

            periods.forEach(p => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td class="border border-gray-300 p-2 bg-gray-50 text-center font-bold text-gray-400 text-xs">${p}</td>`;
                
                days.forEach(dateStr => {
                    const cellData = savedData.find(d => d.date === dateStr && d.period === p);
                    const td = document.createElement('td');
                    td.className = "border border-gray-300 p-1 h-24 md:h-28 align-top hover:bg-emerald-50 transition-colors";
                    
                    const options = subjects.map(s => `<option value="${s.id}" ${cellData?.subject_id === s.id ? 'selected' : ''}>${s.name}</option>`).join('');
                    
                    td.innerHTML = `
                        <select onchange="save('${dateStr}', ${p}, this.value)" class="w-full text-xs font-bold bg-transparent mb-1 outline-none appearance-none cursor-pointer text-emerald-800">
                            <option value="">-- 教科 --</option>
                            ${options}
                        </select>
                        <textarea onblur="updateMemo('${dateStr}', ${p}, this.value)" class="w-full text-[10px] leading-tight h-16 bg-transparent border-none resize-none outline-none focus:bg-white p-1 rounded" placeholder="内容入力...">${cellData?.memo || ''}</textarea>
                    `;
                    tr.appendChild(td);
                });
                body.appendChild(tr);
            });
        }

        async function save(date, period, subjectId) {
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = '保存中...';
            
            const { error } = await _supabase.from('schedules').upsert({
                date: date,
                period: period,
                subject_id: subjectId ? parseInt(subjectId) : null
            }, { onConflict: 'date,period' });

            if (!error) {
                statusEl.innerText = '保存完了';
                setTimeout(() => statusEl.innerText = '接続済み', 2000);
                refreshSummary();
            }
        }

        async function updateMemo(date, period, memo) {
            await _supabase.from('schedules').upsert({
                date: date,
                period: period,
                memo: memo
            }, { onConflict: 'date,period' });
        }

        async function renderSummary(schData) {
            const container = document.getElementById('summary-grid');
            const { data: plans } = await _supabase.from('yearly_plans').select('*').eq('month', 5);

            container.innerHTML = subjects.map(s => {
                const actual = schData.filter(d => d.subject_id === s.id).length;
                const plan = plans?.find(p => p.subject_id === s.id)?.planned_hours || 0;
                const percent = Math.min((actual / (plan || 1)) * 100, 100);
                
                return `
                    <div class="bg-white border border-slate-200 p-2 rounded shadow-sm">
                        <div class="text-[10px] text-slate-400 font-bold mb-1">${s.name}</div>
                        <div class="text-sm font-black text-slate-700">${actual} <span class="text-xs font-normal text-slate-400">/ ${plan}</span></div>
                        <div class="w-full bg-slate-100 h-1 mt-2 rounded-full overflow-hidden">
                            <div class="bg-emerald-500 h-full" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function refreshSummary() {
            const { data } = await _supabase.from('schedules').select('*');
            renderSummary(data || []);
        }

        init();
    </script>
</body>
</html>
